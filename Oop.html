    @<span class="fn">Override</span> <span class="kw">String</span>  <span class="fn">getType</span>()           { <span class="kw">return</span> <span class="str">"Credit Card"</span>; }
}
<span class="kw">class</span> <span class="fn">UPI</span>        <span class="kw">extends</span> <span class="fn">Payment</span> {
    @<span class="fn">Override</span> <span class="kw">boolean</span> <span class="fn">process</span>(<span class="kw">double</span> amt) { <span class="cm">/* UPI transfer */</span> <span class="kw">return true</span>; }
    @<span class="fn">Override</span> <span class="kw">String</span>  <span class="fn">getType</span>()           { <span class="kw">return</span> <span class="str">"UPI"</span>; }
}
<span class="kw">class</span> <span class="fn">Crypto</span>     <span class="kw">extends</span> <span class="fn">Payment</span> {
    @<span class="fn">Override</span> <span class="kw">boolean</span> <span class="fn">process</span>(<span class="kw">double</span> amt) { <span class="cm">/* blockchain tx */</span> <span class="kw">return true</span>; }
    @<span class="fn">Override</span> <span class="kw">String</span>  <span class="fn">getType</span>()           { <span class="kw">return</span> <span class="str">"Crypto"</span>; }
}

<span class="cm">// Checkout service — same code works for ANY payment type!</span>
<span class="kw">class</span> <span class="fn">CheckoutService</span> {
    <span class="kw">void</span> <span class="fn">checkout</span>(<span class="fn">Payment</span> payment, <span class="kw">double</span> amount) {
        payment.<span class="fn">log</span>(amount);
        <span class="kw">if</span> (payment.<span class="fn">process</span>(amount))
            <span class="fn">System.out.println</span>(<span class="str">"Payment successful!"</span>);
    }
}</div>`,

'liskov-principle':`<h2>Liskov Substitution Principle (LSP)</h2>
<p>If S is a subtype of T, objects of type T may be replaced with objects of type S without altering the correctness of the program.</p>
<div class="example-box"><strong>Simple rule:</strong> You should be able to use a child class wherever a parent class is expected, and the program should still work correctly.</div>
<div class="code-block"><span class="cm">// CORRECT LSP: FlyingBird is-a Bird that can fly</span>
<span class="kw">abstract class</span> <span class="fn">Bird</span>       { <span class="kw">abstract void</span> <span class="fn">eat</span>(); }
<span class="kw">abstract class</span> <span class="fn">FlyingBird</span> <span class="kw">extends</span> <span class="fn">Bird</span> { <span class="kw">abstract void</span> <span class="fn">fly</span>(); }
<span class="kw">class</span> <span class="fn">Eagle</span>   <span class="kw">extends</span> <span class="fn">FlyingBird</span> { <span class="kw">void</span> <span class="fn">eat</span>(){} <span class="kw">void</span> <span class="fn">fly</span>(){} }
<span class="kw">class</span> <span class="fn">Penguin</span> <span class="kw">extends</span> <span class="fn">Bird</span>        { <span class="kw">void</span> <span class="fn">eat</span>(){} }
<span class="cm">// Penguin doesn't extend FlyingBird — no need to fake fly()</span></div>`,

'dynamic-binding':`<h2>Dynamic Binding vs Static Binding</h2>
<table><tr><th></th><th>Static Binding</th><th>Dynamic Binding</th></tr>
<tr><td>When resolved</td><td>Compile time</td><td>Runtime</td></tr>
<tr><td>Also called</td><td>Early binding</td><td>Late binding</td></tr>
<tr><td>Performance</td><td>Faster (no lookup)</td><td>Slightly slower (vtable)</td></tr>
<tr><td>Applies to</td><td>static, private, final methods, overloading</td><td>virtual/overridden methods</td></tr>
<tr><td>Requires inheritance</td><td>No</td><td>Yes</td></tr></table>`,

'covariant-return':`<h2>Covariant Return Types</h2>
<div class="code-block"><span class="cm">// Overriding method can return subtype of parent's return type</span>
<span class="kw">class</span> <span class="fn">Animal</span>     { <span class="fn">Animal</span>   <span class="fn">create</span>() { <span class="kw">return new</span> <span class="fn">Animal</span>(); } }
<span class="kw">class</span> <span class="fn">Dog</span> <span class="kw">extends</span> <span class="fn">Animal</span> {
    @<span class="fn">Override</span>
    <span class="fn">Dog</span> <span class="fn">create</span>() { <span class="kw">return new</span> <span class="fn">Dog</span>(); }  <span class="cm">// Dog (subtype of Animal) — valid!</span>
}
<span class="cm">// Java supports covariant return types since Java 5</span>
<span class="cm">// C++ also supports covariant return types for pointer/reference returns</span></div>`,

'interface-segregation':`<h2>Interface Segregation Principle</h2>
<p>Clients should not be forced to depend upon interfaces they do not use. Create smaller, focused interfaces instead of large "fat" ones.</p>
<div class="code-block"><span class="cm">// BAD: PrinterDevice has methods many devices don't need</span>
<span class="kw">interface</span> <span class="fn">AllInOnePrinter</span> {
    <span class="kw">void</span> <span class="fn">print</span>(); <span class="kw">void</span> <span class="fn">scan</span>(); <span class="kw">void</span> <span class="fn">fax</span>(); <span class="kw">void</span> <span class="fn">copy</span>();
}
<span class="cm">// A basic printer must implement scan(), fax(), copy() — useless!</span>

<span class="cm">// GOOD: segregated interfaces</span>
<span class="kw">interface</span> <span class="fn">Printable</span>  { <span class="kw">void</span> <span class="fn">print</span>(); }
<span class="kw">interface</span> <span class="fn">Scannable</span>  { <span class="kw">void</span> <span class="fn">scan</span>(); }
<span class="kw">interface</span> <span class="fn">Faxable</span>    { <span class="kw">void</span> <span class="fn">fax</span>(); }
<span class="kw">class</span> <span class="fn">BasicPrinter</span>  <span class="kw">implements</span> <span class="fn">Printable</span> { ... }
<span class="kw">class</span> <span class="fn">AdvancedPrinter</span> <span class="kw">implements</span> <span class="fn">Printable</span>, <span class="fn">Scannable</span>, <span class="fn">Faxable</span> { ... }</div>`,

'dependency-inversion':`<h2>Dependency Inversion Principle</h2>
<p>High-level modules should not depend on low-level modules. Both should depend on abstractions.</p>
<div class="code-block"><span class="cm">// BAD — UserService directly depends on MySQLDatabase</span>
<span class="kw">class</span> <span class="fn">MySQLDatabase</span> { <span class="kw">void</span> <span class="fn">save</span>(<span class="fn">User</span> u) {} }
<span class="kw">class</span> <span class="fn">UserService</span>   {
    <span class="fn">MySQLDatabase</span> db = <span class="kw">new</span> <span class="fn">MySQLDatabase</span>();  <span class="cm">// tightly coupled!</span>
}

<span class="cm">// GOOD — both depend on abstraction</span>
<span class="kw">interface</span> <span class="fn">Database</span>     { <span class="kw">void</span> <span class="fn">save</span>(<span class="fn">User</span> u); }
<span class="kw">class</span> <span class="fn">MySQLDatabase</span>    <span class="kw">implements</span> <span class="fn">Database</span> { ... }
<span class="kw">class</span> <span class="fn">MongoDatabase</span>    <span class="kw">implements</span> <span class="fn">Database</span> { ... }
<span class="kw">class</span> <span class="fn">UserService</span> {
    <span class="kw">private</span> <span class="fn">Database</span> db;
    <span class="fn">UserService</span>(<span class="fn">Database</span> db) { <span class="kw">this</span>.db = db; }  <span class="cm">// INJECT abstraction</span>
    <span class="kw">void</span> <span class="fn">register</span>(<span class="fn">User</span> u) { db.<span class="fn">save</span>(u); }        <span class="cm">// works with ANY DB</span>
}</div>`,

'packages-java':`<h2>Packages in Java</h2>
<div class="code-block"><span class="cm">// Package declaration — must be first statement</span>
<span class="kw">package</span> com.company.models;

<span class="cm">// Import specific class</span>
<span class="kw">import</span> java.util.ArrayList;

<span class="cm">// Import all classes from package</span>
<span class="kw">import</span> java.util.*;

<span class="cm">// Static import — import static members directly</span>
<span class="kw">import static</span> java.lang.Math.*;
<span class="kw">double</span> r = <span class="fn">sqrt</span>(<span class="num">25</span>);  <span class="cm">// No Math.sqrt() needed</span>

<span class="cm">// Package naming convention: reverse domain name</span>
<span class="cm">// com.google.guava, org.apache.commons, io.netty</span></div>`,

'namespaces-cpp':`<h2>Namespaces in C++</h2>
<div class="code-block"><span class="cm">// Namespace prevents naming conflicts</span>
<span class="kw">namespace</span> <span class="fn">Graphics</span> {
    <span class="kw">class</span> <span class="fn">Color</span> { <span class="kw">int</span> r, g, b; };
    <span class="kw">void</span> <span class="fn">draw</span>() { <span class="fn">cout</span> &lt;&lt; <span class="str">"Graphics draw"</span>; }
}

<span class="kw">namespace</span> <span class="fn">Audio</span> {
    <span class="kw">class</span> <span class="fn">Color</span> { <span class="kw">int</span> frequency; };  <span class="cm">// same name, different namespace</span>
    <span class="kw">void</span> <span class="fn">draw</span>() { <span class="fn">cout</span> &lt;&lt; <span class="str">"Audio draw"</span>; }
}

<span class="fn">Graphics</span>::<span class="fn">Color</span> c1;  <span class="cm">// fully qualified</span>
<span class="fn">Audio</span>::<span class="fn">Color</span> c2;

<span class="kw">using namespace</span> std;  <span class="cm">// standard namespace — brings cout, cin, etc.</span>
<span class="fn">cout</span> &lt;&lt; <span class="str">"Hello"</span>;     <span class="cm">// instead of std::cout</span></div>`,

'friend-class':`<h2>Friend Class & Friend Function (C++)</h2>
<div class="code-block"><span class="cm">// Friend function: access private members without being member</span>
<span class="kw">class</span> <span class="fn">Box</span> {
    <span class="kw">private</span>:
        <span class="kw">double</span> volume;
    <span class="kw">public</span>:
        <span class="fn">Box</span>(<span class="kw">double</span> v) : volume(v) {}
        <span class="kw">friend double</span> <span class="fn">getVolume</span>(<span class="fn">Box</span>&amp; b);  <span class="cm">// declare as friend</span>
        <span class="kw">friend class</span> <span class="fn">BoxFactory</span>;           <span class="cm">// entire class as friend</span>
};

<span class="kw">double</span> <span class="fn">getVolume</span>(<span class="fn">Box</span>&amp; b) {
    <span class="kw">return</span> b.volume;  <span class="cm">// can access private 'volume'</span>
}
<span class="cm">// Use sparingly — breaks encapsulation. Needed for operator<< overloading</span></div>`,

'constructor-chaining':`<h2>Constructor Chaining</h2>
<div class="code-block"><span class="cm">// Java — this() calls another constructor in SAME class</span>
<span class="kw">class</span> <span class="fn">Pizza</span> {
    <span class="kw">String</span> size, crust, topping;

    <span class="fn">Pizza</span>()                                   { <span class="kw">this</span>(<span class="str">"Medium"</span>); }
    <span class="fn">Pizza</span>(<span class="kw">String</span> size)                         { <span class="kw">this</span>(size, <span class="str">"Thin"</span>); }
    <span class="fn">Pizza</span>(<span class="kw">String</span> size, <span class="kw">String</span> crust)          { <span class="kw">this</span>(size, crust, <span class="str">"Cheese"</span>); }
    <span class="fn">Pizza</span>(<span class="kw">String</span> size, <span class="kw">String</span> crust, <span class="kw">String</span> t){
        <span class="kw">this</span>.size=size; <span class="kw">this</span>.crust=crust; <span class="kw">this</span>.topping=t;
    }
}

<span class="cm">// Java — super() calls parent constructor (MUST be first line)</span>
<span class="kw">class</span> <span class="fn">PepperoniPizza</span> <span class="kw">extends</span> <span class="fn">Pizza</span> {
    <span class="fn">PepperoniPizza</span>() {
        <span class="kw">super</span>(<span class="str">"Large"</span>, <span class="str">"Thick"</span>, <span class="str">"Pepperoni"</span>);  <span class="cm">// calls Pizza(String,String,String)</span>
    }
}</div>`,

'inheritance-order':`<h2>Initialization Order in Inheritance</h2>
<div class="code-block"><span class="cm">// Java initialization order</span>
<span class="kw">class</span> <span class="fn">Parent</span> {
    <span class="kw">static</span> { <span class="fn">System.out.println</span>(<span class="str">"1. Parent static block"</span>); }
    { <span class="fn">System.out.println</span>(<span class="str">"3. Parent instance block"</span>); }
    <span class="fn">Parent</span>() { <span class="fn">System.out.println</span>(<span class="str">"4. Parent constructor"</span>); }
}
<span class="kw">class</span> <span class="fn">Child</span> <span class="kw">extends</span> <span class="fn">Parent</span> {
    <span class="kw">static</span> { <span class="fn">System.out.println</span>(<span class="str">"2. Child static block"</span>); }
    { <span class="fn">System.out.println</span>(<span class="str">"5. Child instance block"</span>); }
    <span class="fn">Child</span>() { <span class="fn">System.out.println</span>(<span class="str">"6. Child constructor"</span>); }
}
<span class="cm">// new Child() output order: 1 → 2 → 3 → 4 → 5 → 6</span>
<span class="cm">// Static blocks: run once, parent before child</span>
<span class="cm">// Instance blocks + constructors: parent before child, every instantiation</span></div>`,

'extends-java':`<h2>extends in Java — Full Example</h2>
<div class="code-block"><span class="kw">class</span> <span class="fn">Person</span> {
    <span class="kw">protected</span> <span class="kw">String</span> name;
    <span class="kw">protected</span> <span class="kw">int</span>    age;

    <span class="fn">Person</span>(<span class="kw">String</span> name, <span class="kw">int</span> age) { <span class="kw">this</span>.name=name; <span class="kw">this</span>.age=age; }
    <span class="kw">void</span> <span class="fn">introduce</span>() {
        <span class="fn">System.out.println</span>(<span class="str">"I'm "</span> + name + <span class="str">", age "</span> + age);
    }
}

<span class="kw">class</span> <span class="fn">Student</span> <span class="kw">extends</span> <span class="fn">Person</span> {
    <span class="kw">private</span> <span class="kw">String</span> major;
    <span class="kw">private</span> <span class="kw">double</span> cgpa;

    <span class="fn">Student</span>(<span class="kw">String</span> name, <span class="kw">int</span> age, <span class="kw">String</span> major, <span class="kw">double</span> cgpa) {
        <span class="kw">super</span>(name, age);  <span class="cm">// call Person constructor</span>
        <span class="kw">this</span>.major = major; <span class="kw">this</span>.cgpa = cgpa;
    }

    @<span class="fn">Override</span>
    <span class="kw">void</span> <span class="fn">introduce</span>() {
        <span class="kw">super</span>.<span class="fn">introduce</span>();  <span class="cm">// "I'm Alice, age 20"</span>
        <span class="fn">System.out.println</span>(<span class="str">"Studying "</span> + major + <span class="str">", CGPA: "</span> + cgpa);
    }
}

<span class="fn">Person</span> p = <span class="kw">new</span> <span class="fn">Student</span>(<span class="str">"Alice"</span>, <span class="num">20</span>, <span class="str">"CSE"</span>, <span class="num">9.1</span>);
p.<span class="fn">introduce</span>();  <span class="cm">// Student.introduce() called (runtime polymorphism)</span></div>`,

'inheritance-cpp':`<h2>Inheritance in C++ — Access Specifiers</h2>
<div class="code-block"><span class="kw">class</span> <span class="fn">Base</span> {
<span class="kw">public</span>:    <span class="kw">int</span> pub = <span class="num">1</span>;
<span class="kw">protected</span>: <span class="kw">int</span> prot = <span class="num">2</span>;
<span class="kw">private</span>:   <span class="kw">int</span> priv = <span class="num">3</span>;
};

<span class="cm">// public inheritance (IS-A) — most common</span>
<span class="kw">class</span> <span class="fn">PubDerived</span> : <span class="kw">public</span> <span class="fn">Base</span> {
    <span class="cm">// pub → public, prot → protected, priv → NOT inherited</span>
};

<span class="cm">// protected inheritance — less common</span>
<span class="kw">class</span> <span class="fn">ProtDerived</span> : <span class="kw">protected</span> <span class="fn">Base</span> {
    <span class="cm">// pub → protected, prot → protected, priv → NOT inherited</span>
};

<span class="cm">// private inheritance — rarely used (HAS-A implemented via inheritance)</span>
<span class="kw">class</span> <span class="fn">PrivDerived</span> : <span class="kw">private</span> <span class="fn">Base</span> {
    <span class="cm">// pub → private, prot → private, priv → NOT inherited</span>
};</div>`,

'final-keyword':`<h2>final Class & final Method</h2>
<div class="code-block"><span class="cm">// final class — cannot be subclassed (e.g. String, Integer, Math)</span>
<span class="kw">final class</span> <span class="fn">ImmutablePoint</span> {
    <span class="kw">final double</span> x, y;  <span class="cm">// final field = constant, set once</span>
    <span class="fn">ImmutablePoint</span>(<span class="kw">double</span> x, <span class="kw">double</span> y) { <span class="kw">this</span>.x=x; <span class="kw">this</span>.y=y; }
    <span class="cm">// No setters — value never changes after construction</span>
}
<span class="cm">// class Derived extends ImmutablePoint {}  ← COMPILE ERROR</span>

<span class="cm">// final method — cannot be overridden</span>
<span class="kw">class</span> <span class="fn">Template</span> {
    <span class="kw">final void</span> <span class="fn">runAlgorithm</span>() {  <span class="cm">// template method — fixed steps</span>
        <span class="fn">step1</span>(); <span class="fn">step2</span>(); <span class="fn">step3</span>();
    }
    <span class="kw">void</span> <span class="fn">step1</span>() { <span class="cm">/* default */</span> }
    <span class="kw">void</span> <span class="fn">step2</span>() { <span class="cm">/* override this */</span> }
    <span class="kw">void</span> <span class="fn">step3</span>() { <span class="cm">/* default */</span> }
}</div>`,

'object-class':`<h2>Object Class — Root of Java Hierarchy</h2>
<p>Every Java class implicitly extends <code>java.lang.Object</code>. Key methods to know:</p>
<table><tr><th>Method</th><th>Default Behavior</th><th>When to Override</th></tr>
<tr><td>toString()</td><td>ClassName@hashCode</td><td>Always — for meaningful output</td></tr>
<tr><td>equals(Object)</td><td>Reference equality (==)</td><td>When object equality means same content</td></tr>
<tr><td>hashCode()</td><td>Memory address-based</td><td>Whenever equals() is overridden (contract!)</td></tr>
<tr><td>clone()</td><td>Shallow copy</td><td>When copying objects (implement Cloneable)</td></tr>
<tr><td>getClass()</td><td>Returns Class object</td><td>Rarely — use instanceof instead</td></tr>
<tr><td>finalize()</td><td>Nothing</td><td>Deprecated — don't use</td></tr></table>
<div class="code-block"><span class="cm">// equals + hashCode contract</span>
@<span class="fn">Override</span>
<span class="kw">public boolean</span> <span class="fn">equals</span>(<span class="fn">Object</span> o) {
    <span class="kw">if</span> (<span class="kw">this</span> == o) <span class="kw">return true</span>;
    <span class="kw">if</span> (!(o <span class="kw">instanceof</span> <span class="fn">Student</span> s)) <span class="kw">return false</span>;
    <span class="kw">return</span> id == s.id &amp;&amp; name.<span class="fn">equals</span>(s.name);
}
@<span class="fn">Override</span>
<span class="kw">public int</span> <span class="fn">hashCode</span>() { <span class="kw">return</span> <span class="fn">Objects</span>.<span class="fn">hash</span>(id, name); }  <span class="cm">// same fields!</span></div>`,

'encapsulation-benefits':`<h2>Benefits of Encapsulation</h2>
<table><tr><th>Benefit</th><th>Details</th></tr>
<tr><td>Data Integrity</td><td>Setters validate data before accepting — no invalid state</td></tr>
<tr><td>Flexibility</td><td>Internal implementation can change without affecting external code</td></tr>
<tr><td>Security</td><td>Sensitive fields (password, PIN) cannot be accessed directly</td></tr>
<tr><td>Reusability</td><td>Well-encapsulated classes are self-contained and reusable</td></tr>
<tr><td>Testability</td><td>Encapsulated state = deterministic behavior = easier testing</td></tr>
<tr><td>Maintainability</td><td>Changes are localised within the class</td></tr></table>`,

'immutable-class':`<h2>Immutable Classes — String, Final</h2>
<div class="code-block"><span class="cm">// How to create an immutable class in Java:</span>
<span class="kw">public final class</span> <span class="fn">Money</span> {  <span class="cm">// 1. Declare class as final</span>
    <span class="kw">private final double</span> amount;      <span class="cm">// 2. All fields private final</span>
    <span class="kw">private final</span> <span class="kw">String</span> currency;

    <span class="kw">public</span> <span class="fn">Money</span>(<span class="kw">double</span> amount, <span class="kw">String</span> currency) {
        <span class="kw">this</span>.amount = amount;           <span class="cm">// 3. Set only in constructor</span>
        <span class="kw">this</span>.currency = currency;
    }

    <span class="cm">// 4. Only getters, NO setters</span>
    <span class="kw">public double</span> <span class="fn">getAmount</span>()   { <span class="kw">return</span> amount; }
    <span class="kw">public</span> <span class="kw">String</span> <span class="fn">getCurrency</span>() { <span class="kw">return</span> currency; }

    <span class="cm">// 5. Return new object for "modifications"</span>
    <span class="kw">public</span> <span class="fn">Money</span> <span class="fn">add</span>(<span class="fn">Money</span> other) {
        <span class="kw">return new</span> <span class="fn">Money</span>(<span class="kw">this</span>.amount + other.amount, currency);
    }
}
<span class="cm">// String in Java is immutable — every "modification" creates new String!</span></div>`,

'multiple-interface':`<h2>Implementing Multiple Interfaces</h2>
<div class="code-block"><span class="kw">interface</span> <span class="fn">Flyable</span>   { <span class="kw">default void</span> <span class="fn">fly</span>()   { <span class="fn">System.out.println</span>(<span class="str">"Flying"</span>); } }
<span class="kw">interface</span> <span class="fn">Swimmable</span> { <span class="kw">default void</span> <span class="fn">swim</span>()  { <span class="fn">System.out.println</span>(<span class="str">"Swimming"</span>); } }
<span class="kw">interface</span> <span class="fn">Runnable</span>  { <span class="kw">void</span> <span class="fn">run</span>(); }  <span class="cm">// note: java.lang.Runnable already exists</span>

<span class="kw">class</span> <span class="fn">Duck</span> <span class="kw">implements</span> <span class="fn">Flyable</span>, <span class="fn">Swimmable</span>, <span class="fn">Runnable</span> {
    <span class="kw">public void</span> <span class="fn">run</span>() { <span class="fn">System.out.println</span>(<span class="str">"Duck running"</span>); }
    <span class="cm">// fly() and swim() inherited as default methods</span>
}

<span class="cm">// Conflict resolution: if two interfaces have same default method</span>
<span class="kw">interface</span> <span class="fn">A</span> { <span class="kw">default void</span> <span class="fn">hello</span>() { <span class="fn">System.out.println</span>(<span class="str">"A"</span>); } }
<span class="kw">interface</span> <span class="fn">B</span> { <span class="kw">default void</span> <span class="fn">hello</span>() { <span class="fn">System.out.println</span>(<span class="str">"B"</span>); } }
<span class="kw">class</span> <span class="fn">C</span> <span class="kw">implements</span> <span class="fn">A</span>, <span class="fn">B</span> {
    <span class="kw">public void</span> <span class="fn">hello</span>() { <span class="fn">A</span>.<span class="kw">super</span>.<span class="fn">hello</span>(); }  <span class="cm">// MUST override to resolve conflict</span>
}</div>`,

'default-methods':`<h2>Default & Static Methods in Interfaces (Java 8+)</h2>
<div class="code-block"><span class="kw">interface</span> <span class="fn">Collection</span>&lt;T&gt; {
    <span class="kw">void</span> <span class="fn">add</span>(T item);
    <span class="kw">int</span>  <span class="fn">size</span>();

    <span class="cm">// Default method — has implementation, can be overridden</span>
    <span class="kw">default boolean</span> <span class="fn">isEmpty</span>() {
        <span class="kw">return</span> <span class="fn">size</span>() == <span class="num">0</span>;  <span class="cm">// uses abstract method</span>
    }

    <span class="cm">// Default method with complex logic — avoids code duplication</span>
    <span class="kw">default void</span> <span class="fn">addAll</span>(<span class="fn">T</span>... items) {
        <span class="kw">for</span> (T item : items) <span class="fn">add</span>(item);
    }

    <span class="cm">// Static method — utility factory, cannot be overridden</span>
    <span class="kw">static</span> &lt;T&gt; <span class="fn">Collection</span>&lt;T&gt; <span class="fn">empty</span>() {
        <span class="kw">return new</span> <span class="fn">EmptyCollection</span>&lt;&gt;();
    }

    <span class="cm">// Private method (Java 9+) — helper for default methods</span>
    <span class="kw">private void</span> <span class="fn">logAdd</span>(T item) { <span class="cm">/* internal helper */</span> }
}</div>`

let currentStep=1,completedSteps=JSON.parse(localStorage.getItem('oop_completedSteps')||'[]');
function updateProgress(){const p=(completedSteps.length/6)*100;document.getElementById('progressFill').style.width=p+'%';document.getElementById('progressPercent').textContent=Math.round(p)+'%';document.querySelectorAll('.step-btn').forEach(b=>b.classList.toggle('completed',completedSteps.includes(parseInt(b.dataset.step))));}
function markStepComplete(step){if(!completedSteps.includes(step)){completedSteps.push(step);localStorage.setItem('oop_completedSteps',JSON.stringify(completedSteps));updateProgress();renderStepContent(step);}}
function renderStepContent(step){currentStep=step;const sd=stepsData[step];const isC=completedSteps.includes(step);let html=`<div class="step-content active"><div class="step-header"><div><h2>${sd.title}</h2><p>${sd.description}</p></div>${!isC?`<button class="complete-step-btn" onclick="markStepComplete(${step})">✓ Mark as Complete</button>`:'<div class="completed-badge">✓ Step Completed! 🎉</div>'}</div>`;sd.topics.forEach(t=>{html+=`<div class="topic-card" onclick="toggleSubTopics(this)"><div class="topic-header"><h3><span class="topic-icon">${t.icon}</span> ${t.title}</h3><span class="arrow">›</span></div><div class="sub-topics">`;t.subs.forEach(s=>{html+=`<div class="sub-topic" onclick="showContent(event,'${s.id}')">${s.title}</div>`;});html+=`</div></div>`;});html+=`<div class="detail-container" id="detailContainer"><p style="color:#94a3b8;text-align:center;">🧱 Click any topic to view detailed explanations with Java, C++ and Python code examples.</p></div><div class="nav-buttons">${step>1?`<button class="nav-btn prev" onclick="changeStep(${step-1})">← Previous</button>`:'<div></div>'}${step<6?`<button class="nav-btn next" onclick="changeStep(${step+1})">Next →</button>`:`<button class="nav-btn next" onclick="window.location.href='subjects.html'">🏆 Complete OOP →</button>`}</div></div>`;document.getElementById('contentSection').innerHTML=html;document.querySelectorAll('.step-btn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.step)===step));}
function changeStep(s){if(s>=1&&s<=6){renderStepContent(s);window.scrollTo({top:0,behavior:'smooth'});}}
function toggleSubTopics(card){const sub=card.querySelector('.sub-topics');const arrow=card.querySelector('.arrow');document.querySelectorAll('.sub-topics').forEach(s=>{if(s!==sub)s.classList.remove('active');});sub.classList.toggle('active');if(arrow)arrow.style.transform=sub.classList.contains('active')?'rotate(90deg)':'rotate(0deg)';}
function showContent(e,id){e.stopPropagation();const dc=document.getElementById('detailContainer');dc.innerHTML=detailedContent[id]||'<p>Content coming soon!</p>';dc.scrollIntoView({behavior:'smooth',block:'start'});}
document.querySelectorAll('.step-btn').forEach(b=>b.addEventListener('click',()=>changeStep(parseInt(b.dataset.step))));
updateProgress();renderStepContent(1);
</script>

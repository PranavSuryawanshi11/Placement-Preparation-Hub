const detailedContent = {
'db-intro':`<h2>What is a Database & DBMS?</h2>
<p>A <strong>Database</strong> is an organized collection of structured data stored electronically. A <strong>DBMS (Database Management System)</strong> is software that manages, creates, and retrieves data from a database.</p>
<div class="example-box"><strong>Real-World Examples:</strong><br>• MySQL, PostgreSQL, Oracle — Relational DBMS<br>• MongoDB, Cassandra — NoSQL DBMS<br>• SQLite — Embedded DBMS<br>• Microsoft SQL Server — Enterprise DBMS</div>
<h3>Advantages of DBMS over File Systems</h3>
<table><tr><th>File System</th><th>DBMS</th></tr>
<tr><td>Data redundancy</td><td>Controlled redundancy</td></tr>
<tr><td>Data inconsistency</td><td>Data consistency guaranteed</td></tr>
<tr><td>No concurrent access control</td><td>Multi-user concurrent access</td></tr>
<tr><td>No recovery mechanism</td><td>Crash recovery built-in</td></tr>
<tr><td>No security</td><td>Role-based access control</td></tr>
<tr><td>No query language</td><td>SQL for powerful queries</td></tr></table>
<div class="tip-box">💡 <strong>Interview Answer:</strong> "DBMS solves the problems of data redundancy, inconsistency, integrity, security, and concurrent access that exist in traditional file-based systems."</div>`,

'db-architecture':`<h2>3-Level DBMS Architecture (ANSI/SPARC)</h2>
<p>The 3-level architecture separates the user view from the physical storage, providing data abstraction and independence.</p>
<table><tr><th>Level</th><th>Name</th><th>Description</th><th>Who Sees It</th></tr>
<tr><td>Level 1</td><td>External / View Level</td><td>What users see — customized views</td><td>End users, applications</td></tr>
<tr><td>Level 2</td><td>Conceptual / Logical Level</td><td>Entire database structure, tables, relationships</td><td>DBA, developers</td></tr>
<tr><td>Level 3</td><td>Internal / Physical Level</td><td>How data is physically stored on disk</td><td>DBMS engine, DBA</td></tr></table>
<div class="example-box"><strong>Data Independence:</strong><br>
• <strong>Logical Data Independence:</strong> Change conceptual schema without affecting external views<br>
• <strong>Physical Data Independence:</strong> Change internal schema (storage) without affecting conceptual schema</div>
<div class="tip-box">💡 Physical data independence is easier to achieve than logical data independence.</div>`,

'db-keys':`<h2>Keys in DBMS</h2>
<p>Keys are used to uniquely identify records and establish relationships between tables.</p>
<table><tr><th>Key Type</th><th>Definition</th><th>Example</th></tr>
<tr><td>Super Key</td><td>Any set of attributes that uniquely identifies a tuple</td><td>{StudentID}, {StudentID, Name}, {Email}</td></tr>
<tr><td>Candidate Key</td><td>Minimal super key (no redundant attributes)</td><td>{StudentID}, {Email}</td></tr>
<tr><td>Primary Key</td><td>Chosen candidate key — NOT NULL, UNIQUE</td><td>{StudentID}</td></tr>
<tr><td>Alternate Key</td><td>Candidate keys not chosen as primary</td><td>{Email}</td></tr>
<tr><td>Foreign Key</td><td>References primary key of another table</td><td>Orders.CustomerID → Customers.CustomerID</td></tr>
<tr><td>Composite Key</td><td>Primary key made of multiple attributes</td><td>{CourseID, StudentID} in Enrollment</td></tr>
<tr><td>Surrogate Key</td><td>Artificially generated key (auto-increment)</td><td>id INT AUTO_INCREMENT</td></tr></table>
<div class="code-block"><span class="sql-cmt">-- Demonstrating keys in SQL</span>
<span class="sql-kw">CREATE TABLE</span> Students (
    student_id   <span class="sql-fn">INT</span> <span class="sql-kw">AUTO_INCREMENT</span>,  <span class="sql-cmt">-- Surrogate/Primary Key</span>
    email        <span class="sql-fn">VARCHAR</span>(<span class="sql-num">100</span>) <span class="sql-kw">UNIQUE NOT NULL</span>, <span class="sql-cmt">-- Alternate Key</span>
    roll_no      <span class="sql-fn">VARCHAR</span>(<span class="sql-num">20</span>) <span class="sql-kw">UNIQUE NOT NULL</span>,  <span class="sql-cmt">-- Alternate Key</span>
    name         <span class="sql-fn">VARCHAR</span>(<span class="sql-num">100</span>) <span class="sql-kw">NOT NULL</span>,
    dept_id      <span class="sql-fn">INT</span>,
    <span class="sql-kw">PRIMARY KEY</span> (student_id),
    <span class="sql-kw">FOREIGN KEY</span> (dept_id) <span class="sql-kw">REFERENCES</span> Departments(dept_id)
        <span class="sql-kw">ON DELETE SET NULL ON UPDATE CASCADE</span>
);</div>`,

'db-models':`<h2>Data Models</h2>
<table><tr><th>Model</th><th>Structure</th><th>Example</th></tr>
<tr><td>Relational</td><td>Tables (relations) with rows and columns</td><td>MySQL, PostgreSQL</td></tr>
<tr><td>Hierarchical</td><td>Tree structure — parent-child</td><td>IBM IMS, Windows Registry</td></tr>
<tr><td>Network</td><td>Graph — many-to-many relationships</td><td>IDMS</td></tr>
<tr><td>Object-Oriented</td><td>Objects with attributes and methods</td><td>ObjectDB</td></tr>
<tr><td>Document</td><td>JSON/BSON documents</td><td>MongoDB</td></tr>
<tr><td>Key-Value</td><td>Simple key → value pairs</td><td>Redis, DynamoDB</td></tr></table>`,

'er-model':`<h2>Entity-Relationship (ER) Model</h2>
<p>The ER model is a conceptual data model that describes data as entities, attributes, and relationships.</p>
<table><tr><th>Component</th><th>Symbol</th><th>Description</th></tr>
<tr><td>Entity</td><td>Rectangle □</td><td>A real-world object (Student, Course)</td></tr>
<tr><td>Attribute</td><td>Ellipse ○</td><td>Property of an entity (Name, Age)</td></tr>
<tr><td>Relationship</td><td>Diamond ◇</td><td>Association between entities (Enrolls)</td></tr>
<tr><td>Weak Entity</td><td>Double Rectangle</td><td>Depends on another entity for identity</td></tr>
<tr><td>Primary Key Attr</td><td>Underlined ellipse</td><td>Uniquely identifies entity</td></tr></table>
<div class="example-box"><strong>Example ER:</strong> Student —(Enrolls)— Course<br>
• Student: StudentID (PK), Name, Email<br>
• Course: CourseID (PK), Title, Credits<br>
• Enrolls: StudentID (FK), CourseID (FK), EnrollDate, Grade</div>`,

'er-attributes':`<h2>Types of Attributes</h2>
<table><tr><th>Type</th><th>Description</th><th>Example</th></tr>
<tr><td>Simple / Atomic</td><td>Cannot be divided further</td><td>Age, RollNo</td></tr>
<tr><td>Composite</td><td>Can be divided into sub-parts</td><td>Name = {FirstName, LastName}</td></tr>
<tr><td>Multivalued</td><td>Can have multiple values</td><td>PhoneNumbers = {91-xxx, 90-xxx}</td></tr>
<tr><td>Derived</td><td>Computed from other attributes</td><td>Age derived from DateOfBirth</td></tr>
<tr><td>Stored</td><td>The base attribute used for derivation</td><td>DateOfBirth (used to derive Age)</td></tr>
<tr><td>Key</td><td>Uniquely identifies an entity</td><td>StudentID</td></tr>
<tr><td>Null</td><td>May have no value</td><td>MiddleName (optional)</td></tr></table>`,

'er-relationships':`<h2>Relationships — Cardinality & Participation</h2>
<h3>Cardinality Ratios</h3>
<table><tr><th>Type</th><th>Notation</th><th>Example</th></tr>
<tr><td>One-to-One (1:1)</td><td>1——1</td><td>Person — Passport</td></tr>
<tr><td>One-to-Many (1:N)</td><td>1——N</td><td>Department — Employees</td></tr>
<tr><td>Many-to-One (N:1)</td><td>N——1</td><td>Students — College</td></tr>
<tr><td>Many-to-Many (M:N)</td><td>M——N</td><td>Students — Courses</td></tr></table>
<h3>Participation Constraints</h3>
<table><tr><th>Type</th><th>Meaning</th></tr>
<tr><td>Total Participation (double line)</td><td>Every entity MUST participate in the relationship</td></tr>
<tr><td>Partial Participation (single line)</td><td>Entity may or may not participate</td></tr></table>
<div class="example-box"><strong>Example:</strong> Every Employee MUST belong to a Department (total participation of Employee in "Works In"). But a Department may exist without employees (partial participation of Department).</div>`,

'er-to-relational':`<h2>Converting ER Diagram to Relational Schema</h2>
<h3>Mapping Rules</h3>
<ol>
<li><strong>Strong Entity:</strong> Becomes a table with all simple attributes. Composite → flatten into simple. Multivalued → separate table.</li>
<li><strong>Weak Entity:</strong> Table with partial key + primary key of owner entity as composite PK.</li>
<li><strong>1:1 Relationship:</strong> Merge into one table, or add FK to either side.</li>
<li><strong>1:N Relationship:</strong> Add FK in the "many" side table.</li>
<li><strong>M:N Relationship:</strong> Create a new junction/bridge table with both PKs as composite PK.</li>
</ol>
<div class="code-block"><span class="sql-cmt">-- M:N: Student Enrolls Course → junction table</span>
<span class="sql-kw">CREATE TABLE</span> Enrollment (
    student_id  <span class="sql-fn">INT</span>,
    course_id   <span class="sql-fn">INT</span>,
    enroll_date <span class="sql-fn">DATE</span>,
    grade       <span class="sql-fn">CHAR</span>(<span class="sql-num">2</span>),
    <span class="sql-kw">PRIMARY KEY</span> (student_id, course_id),
    <span class="sql-kw">FOREIGN KEY</span> (student_id) <span class="sql-kw">REFERENCES</span> Students(student_id),
    <span class="sql-kw">FOREIGN KEY</span> (course_id)  <span class="sql-kw">REFERENCES</span> Courses(course_id)
);</div>`,

'relational-model':`<h2>Relational Model</h2>
<p>The relational model organizes data into <strong>relations (tables)</strong>. Each table has rows (tuples) and columns (attributes).</p>
<table><tr><th>Term</th><th>Mathematical</th><th>SQL / DB</th></tr>
<tr><td>Relation</td><td>Relation</td><td>Table</td></tr>
<tr><td>Tuple</td><td>n-tuple</td><td>Row / Record</td></tr>
<tr><td>Attribute</td><td>Attribute</td><td>Column / Field</td></tr>
<tr><td>Domain</td><td>Domain</td><td>Data type + constraints</td></tr>
<tr><td>Degree</td><td>Arity</td><td>Number of columns</td></tr>
<tr><td>Cardinality</td><td>Cardinality</td><td>Number of rows</td></tr>
<tr><td>Schema</td><td>Relation schema</td><td>Table definition (CREATE TABLE)</td></tr></table>`,

'relational-algebra':`<h2>Relational Algebra Operations</h2>
<p>Relational algebra is a procedural query language — the theoretical foundation of SQL.</p>
<table><tr><th>Operation</th><th>Symbol</th><th>SQL Equivalent</th><th>Description</th></tr>
<tr><td>Select</td><td>σ (sigma)</td><td>WHERE</td><td>Filter rows based on condition</td></tr>
<tr><td>Project</td><td>π (pi)</td><td>SELECT columns</td><td>Select specific columns</td></tr>
<tr><td>Union</td><td>∪</td><td>UNION</td><td>Combine rows from two relations</td></tr>
<tr><td>Intersection</td><td>∩</td><td>INTERSECT</td><td>Common rows in two relations</td></tr>
<tr><td>Difference</td><td>−</td><td>EXCEPT</td><td>Rows in R1 but not R2</td></tr>
<tr><td>Cartesian Product</td><td>×</td><td>CROSS JOIN</td><td>All combinations of rows</td></tr>
<tr><td>Join</td><td>⋈</td><td>JOIN</td><td>Combine related rows</td></tr>
<tr><td>Rename</td><td>ρ (rho)</td><td>AS alias</td><td>Rename relation or attributes</td></tr></table>
<div class="code-block"><span class="sql-cmt">-- σ (Select) → WHERE</span>
<span class="sql-kw">SELECT</span> * <span class="sql-kw">FROM</span> Students <span class="sql-kw">WHERE</span> dept = <span class="sql-str">'CSE'</span>;

<span class="sql-cmt">-- π (Project) → SELECT specific columns</span>
<span class="sql-kw">SELECT</span> name, email <span class="sql-kw">FROM</span> Students;

<span class="sql-cmt">-- Natural Join</span>
<span class="sql-kw">SELECT</span> s.name, c.title
<span class="sql-kw">FROM</span> Students s <span class="sql-kw">NATURAL JOIN</span> Enrollment e <span class="sql-kw">JOIN</span> Courses c
<span class="sql-kw">ON</span> e.course_id = c.course_id;</div>`,

'integrity-constraints':`<h2>Integrity Constraints</h2>
<table><tr><th>Constraint</th><th>Description</th><th>SQL</th></tr>
<tr><td>Domain</td><td>Attribute values must be from valid domain</td><td>Data type + CHECK</td></tr>
<tr><td>Entity Integrity</td><td>Primary key must be NOT NULL and UNIQUE</td><td>PRIMARY KEY</td></tr>
<tr><td>Referential Integrity</td><td>FK must match existing PK or be NULL</td><td>FOREIGN KEY</td></tr>
<tr><td>NOT NULL</td><td>Column cannot have NULL</td><td>NOT NULL</td></tr>
<tr><td>UNIQUE</td><td>All values in column must be unique</td><td>UNIQUE</td></tr>
<tr><td>CHECK</td><td>Value must satisfy boolean expression</td><td>CHECK (age > 18)</td></tr>
<tr><td>DEFAULT</td><td>Default value if none provided</td><td>DEFAULT 'Active'</td></tr></table>
<div class="code-block"><span class="sql-kw">CREATE TABLE</span> Employees (
    emp_id     <span class="sql-fn">INT</span> <span class="sql-kw">PRIMARY KEY AUTO_INCREMENT</span>,
    name       <span class="sql-fn">VARCHAR</span>(<span class="sql-num">100</span>) <span class="sql-kw">NOT NULL</span>,
    salary     <span class="sql-fn">DECIMAL</span>(<span class="sql-num">10</span>,<span class="sql-num">2</span>) <span class="sql-kw">CHECK</span> (salary &gt; <span class="sql-num">0</span>),
    dept_id    <span class="sql-fn">INT</span> <span class="sql-kw">NOT NULL</span>,
    status     <span class="sql-fn">VARCHAR</span>(<span class="sql-num">20</span>) <span class="sql-kw">DEFAULT</span> <span class="sql-str">'Active'</span>
               <span class="sql-kw">CHECK</span> (status <span class="sql-kw">IN</span> (<span class="sql-str">'Active'</span>, <span class="sql-str">'Inactive'</span>, <span class="sql-str">'On Leave'</span>)),
    join_date  <span class="sql-fn">DATE</span> <span class="sql-kw">NOT NULL DEFAULT</span> <span class="sql-fn">CURDATE</span>(),
    <span class="sql-kw">FOREIGN KEY</span> (dept_id) <span class="sql-kw">REFERENCES</span> Departments(dept_id)
        <span class="sql-kw">ON DELETE RESTRICT ON UPDATE CASCADE</span>
);</div>`,

'ddl-create':`<h2>CREATE TABLE — Define Schema</h2>
<div class="code-block"><span class="sql-cmt">-- Full CREATE TABLE with all features</span>
<span class="sql-kw">CREATE TABLE</span> Orders (
    order_id     <span class="sql-fn">INT</span> <span class="sql-kw">PRIMARY KEY AUTO_INCREMENT</span>,
    customer_id  <span class="sql-fn">INT</span> <span class="sql-kw">NOT NULL</span>,
    order_date   <span class="sql-fn">DATETIME</span> <span class="sql-kw">DEFAULT</span> <span class="sql-fn">NOW</span>(),
    total_amount <span class="sql-fn">DECIMAL</span>(<span class="sql-num">12</span>, <span class="sql-num">2</span>) <span class="sql-kw">NOT NULL CHECK</span> (total_amount &gt;= <span class="sql-num">0</span>),
    status       <span class="sql-fn">ENUM</span>(<span class="sql-str">'Pending'</span>,<span class="sql-str">'Shipped'</span>,<span class="sql-str">'Delivered'</span>,<span class="sql-str">'Cancelled'</span>) <span class="sql-kw">DEFAULT</span> <span class="sql-str">'Pending'</span>,
    shipping_address <span class="sql-fn">TEXT</span>,
    <span class="sql-kw">FOREIGN KEY</span> (customer_id) <span class="sql-kw">REFERENCES</span> Customers(customer_id)
        <span class="sql-kw">ON DELETE CASCADE ON UPDATE CASCADE</span>
);

<span class="sql-cmt">-- CREATE TABLE AS SELECT (CTAS)</span>
<span class="sql-kw">CREATE TABLE</span> HighValueOrders <span class="sql-kw">AS</span>
    <span class="sql-kw">SELECT</span> * <span class="sql-kw">FROM</span> Orders <span class="sql-kw">WHERE</span> total_amount &gt; <span class="sql-num">10000</span>;

<span class="sql-cmt">-- CREATE INDEX on a column</span>
<span class="sql-kw">CREATE INDEX</span> idx_customer <span class="sql-kw">ON</span> Orders(customer_id);
<span class="sql-kw">CREATE UNIQUE INDEX</span> idx_email <span class="sql-kw">ON</span> Customers(email);</div>`,

'ddl-alter':`<h2>ALTER TABLE — Modify Schema</h2>
<div class="code-block"><span class="sql-cmt">-- Add a new column</span>
<span class="sql-kw">ALTER TABLE</span> Students <span class="sql-kw">ADD COLUMN</span> phone <span class="sql-fn">VARCHAR</span>(<span class="sql-num">15</span>);
<span class="sql-kw">ALTER TABLE</span> Students <span class="sql-kw">ADD COLUMN</span> cgpa <span class="sql-fn">DECIMAL</span>(<span class="sql-num">4</span>,<span class="sql-num">2</span>) <span class="sql-kw">DEFAULT</span> <span class="sql-num">0.00</span>;

<span class="sql-cmt">-- Modify existing column type/constraint</span>
<span class="sql-kw">ALTER TABLE</span> Students <span class="sql-kw">MODIFY COLUMN</span> phone <span class="sql-fn">VARCHAR</span>(<span class="sql-num">20</span>) <span class="sql-kw">NOT NULL</span>;

<span class="sql-cmt">-- Rename column</span>
<span class="sql-kw">ALTER TABLE</span> Students <span class="sql-kw">RENAME COLUMN</span> phone <span class="sql-kw">TO</span> mobile;

<span class="sql-cmt">-- Drop column</span>
<span class="sql-kw">ALTER TABLE</span> Students <span class="sql-kw">DROP COLUMN</span> phone;

<span class="sql-cmt">-- Add foreign key constraint</span>
<span class="sql-kw">ALTER TABLE</span> Orders <span class="sql-kw">ADD CONSTRAINT</span> fk_customer
    <span class="sql-kw">FOREIGN KEY</span> (customer_id) <span class="sql-kw">REFERENCES</span> Customers(id);

<span class="sql-cmt">-- Drop constraint</span>
<span class="sql-kw">ALTER TABLE</span> Orders <span class="sql-kw">DROP FOREIGN KEY</span> fk_customer;
<span class="sql-kw">ALTER TABLE</span> Students <span class="sql-kw">DROP INDEX</span> idx_email;</div>`,

'ddl-drop':`<h2>DROP, TRUNCATE vs DELETE</h2>
<table><tr><th>Command</th><th>Removes</th><th>Rollback?</th><th>Triggers?</th><th>Speed</th></tr>
<tr><td>DELETE</td><td>Specific rows (WHERE)</td><td>Yes (DML, in transaction)</td><td>Yes</td><td>Slowest</td></tr>
<tr><td>TRUNCATE</td><td>All rows, keeps structure</td><td>No (DDL)</td><td>No</td><td>Fast</td></tr>
<tr><td>DROP</td><td>Table + data + structure</td><td>No (DDL)</td><td>No</td><td>Fastest</td></tr></table>
<div class="code-block"><span class="sql-cmt">-- DELETE — removes rows, logs each row</span>
<span class="sql-kw">DELETE FROM</span> Orders <span class="sql-kw">WHERE</span> status = <span class="sql-str">'Cancelled'</span>;
<span class="sql-kw">DELETE FROM</span> Temp_Table;  <span class="sql-cmt">-- deletes all rows but CAN be rolled back</span>

<span class="sql-cmt">-- TRUNCATE — removes all rows fast, resets AUTO_INCREMENT</span>
<span class="sql-kw">TRUNCATE TABLE</span> Temp_Table;

<span class="sql-cmt">-- DROP — removes everything</span>
<span class="sql-kw">DROP TABLE IF EXISTS</span> Temp_Table;
<span class="sql-kw">DROP DATABASE IF EXISTS</span> test_db;</div>`,

'dml-select':`<h2>SELECT — Basic to Advanced Queries</h2>
<div class="code-block"><span class="sql-cmt">-- Basic SELECT</span>
<span class="sql-kw">SELECT</span> * <span class="sql-kw">FROM</span> Employees;
<span class="sql-kw">SELECT</span> name, salary, dept <span class="sql-kw">FROM</span> Employees;

<span class="sql-cmt">-- SELECT with expressions & aliases</span>
<span class="sql-kw">SELECT</span>
    name,
    salary,
    salary * <span class="sql-num">12</span> <span class="sql-kw">AS</span> annual_salary,
    <span class="sql-fn">CONCAT</span>(first_name, <span class="sql-str">' '</span>, last_name) <span class="sql-kw">AS</span> full_name,
    <span class="sql-fn">UPPER</span>(dept) <span class="sql-kw">AS</span> department
<span class="sql-kw">FROM</span> Employees;

<span class="sql-cmt">-- SELECT DISTINCT — remove duplicates</span>
<span class="sql-kw">SELECT DISTINCT</span> dept <span class="sql-kw">FROM</span> Employees;

<span class="sql-cmt">-- CASE expression (conditional column)</span>
<span class="sql-kw">SELECT</span>
    name,
    salary,
    <span class="sql-kw">CASE</span>
        <span class="sql-kw">WHEN</span> salary &gt; <span class="sql-num">100000</span> <span class="sql-kw">THEN</span> <span class="sql-str">'Senior'</span>
        <span class="sql-kw">WHEN</span> salary &gt; <span class="sql-num">50000</span>  <span class="sql-kw">THEN</span> <span class="sql-str">'Mid-Level'</span>
        <span class="sql-kw">ELSE</span> <span class="sql-str">'Junior'</span>
    <span class="sql-kw">END</span> <span class="sql-kw">AS</span> level
<span class="sql-kw">FROM</span> Employees;</div>`,

'dml-where':`<h2>WHERE Clause — Conditions & Operators</h2>
<div class="code-block"><span class="sql-cmt">-- Comparison operators</span>
<span class="sql-kw">SELECT</span> * <span class="sql-kw">FROM</span> Employees <span class="sql-kw">WHERE</span> salary &gt; <span class="sql-num">50000</span>;
<span class="sql-kw">SELECT</span> * <span class="sql-kw">FROM</span> Employees <span class="sql-kw">WHERE</span> dept &lt;&gt; <span class="sql-str">'HR'</span>;   <span class="sql-cmt">-- != same as &lt;&gt;</span>

<span class="sql-cmt">-- Logical operators</span>
<span class="sql-kw">SELECT</span> * <span class="sql-kw">FROM</span> Employees
<span class="sql-kw">WHERE</span> dept = <span class="sql-str">'CSE'</span> <span class="sql-kw">AND</span> salary &gt; <span class="sql-num">60000</span>;

<span class="sql-cmt">-- IN — match from list</span>
<span class="sql-kw">SELECT</span> * <span class="sql-kw">FROM</span> Students <span class="sql-kw">WHERE</span> dept <span class="sql-kw">IN</span> (<span class="sql-str">'CSE'</span>, <span class="sql-str">'IT'</span>, <span class="sql-str">'ECE'</span>);

<span class="sql-cmt">-- BETWEEN — inclusive range</span>
<span class="sql-kw">SELECT</span> * <span class="sql-kw">FROM</span> Employees <span class="sql-kw">WHERE</span> salary <span class="sql-kw">BETWEEN</span> <span class="sql-num">40000</span> <span class="sql-kw">AND</span> <span class="sql-num">80000</span>;

<span class="sql-cmt">-- LIKE — pattern matching</span>
<span class="sql-kw">SELECT</span> * <span class="sql-kw">FROM</span> Customers <span class="sql-kw">WHERE</span> name <span class="sql-kw">LIKE</span> <span class="sql-str">'A%'</span>;     <span class="sql-cmt">-- starts with A</span>
<span class="sql-kw">SELECT</span> * <span class="sql-kw">FROM</span> Customers <span class="sql-kw">WHERE</span> email <span class="sql-kw">LIKE</span> <span class="sql-str">'%@gmail.com'</span>;
<span class="sql-kw">SELECT</span> * <span class="sql-kw">FROM</span> Customers <span class="sql-kw">WHERE</span> name <span class="sql-kw">LIKE</span> <span class="sql-str">'_ohn'</span>;  <span class="sql-cmt">-- _ = single char</span>

<span class="sql-cmt">-- IS NULL / IS NOT NULL</span>
<span class="sql-kw">SELECT</span> * <span class="sql-kw">FROM</span> Employees <span class="sql-kw">WHERE</span> manager_id <span class="sql-kw">IS NULL</span>;  <span class="sql-cmt">-- top-level managers</span></div>`,

'dml-insert':`<h2>INSERT, UPDATE, DELETE</h2>
<div class="code-block"><span class="sql-cmt">-- INSERT single row</span>
<span class="sql-kw">INSERT INTO</span> Students (name, email, dept, cgpa)
<span class="sql-kw">VALUES</span> (<span class="sql-str">'Arjun Sharma'</span>, <span class="sql-str">'arjun@college.edu'</span>, <span class="sql-str">'CSE'</span>, <span class="sql-num">8.5</span>);

<span class="sql-cmt">-- INSERT multiple rows</span>
<span class="sql-kw">INSERT INTO</span> Students (name, email, dept, cgpa) <span class="sql-kw">VALUES</span>
    (<span class="sql-str">'Priya Mehta'</span>,  <span class="sql-str">'priya@college.edu'</span>,  <span class="sql-str">'IT'</span>,  <span class="sql-num">9.1</span>),
    (<span class="sql-str">'Rahul Gupta'</span>,  <span class="sql-str">'rahul@college.edu'</span>,  <span class="sql-str">'ECE'</span>, <span class="sql-num">7.8</span>),
    (<span class="sql-str">'Sneha Joshi'</span>,  <span class="sql-str">'sneha@college.edu'</span>,  <span class="sql-str">'CSE'</span>, <span class="sql-num">8.9</span>);

<span class="sql-cmt">-- INSERT from SELECT</span>
<span class="sql-kw">INSERT INTO</span> Alumni (name, email) <span class="sql-kw">SELECT</span> name, email
<span class="sql-kw">FROM</span> Students <span class="sql-kw">WHERE</span> graduation_year = <span class="sql-num">2024</span>;

<span class="sql-cmt">-- UPDATE</span>
<span class="sql-kw">UPDATE</span> Students <span class="sql-kw">SET</span> cgpa = <span class="sql-num">9.0</span> <span class="sql-kw">WHERE</span> student_id = <span class="sql-num">101</span>;
<span class="sql-kw">UPDATE</span> Employees <span class="sql-kw">SET</span> salary = salary * <span class="sql-num">1.1</span> <span class="sql-kw">WHERE</span> dept = <span class="sql-str">'CSE'</span>;

<span class="sql-cmt">-- DELETE with condition</span>
<span class="sql-kw">DELETE FROM</span> Students <span class="sql-kw">WHERE</span> cgpa &lt; <span class="sql-num">4.0</span> <span class="sql-kw">AND</span> year = <span class="sql-num">1</span>;</div>`,

'dml-orderby':`<h2>ORDER BY, GROUP BY, HAVING</h2>
<div class="code-block"><span class="sql-cmt">-- ORDER BY — sort results</span>
<span class="sql-kw">SELECT</span> name, salary <span class="sql-kw">FROM</span> Employees <span class="sql-kw">ORDER BY</span> salary <span class="sql-kw">DESC</span>;
<span class="sql-kw">SELECT</span> name, dept, salary <span class="sql-kw">FROM</span> Employees
<span class="sql-kw">ORDER BY</span> dept <span class="sql-kw">ASC</span>, salary <span class="sql-kw">DESC</span>;  <span class="sql-cmt">-- multiple sort columns</span>

<span class="sql-cmt">-- Aggregate Functions</span>
<span class="sql-kw">SELECT</span>
    <span class="sql-fn">COUNT</span>(*) <span class="sql-kw">AS</span> total_employees,
    <span class="sql-fn">SUM</span>(salary) <span class="sql-kw">AS</span> total_salary,
    <span class="sql-fn">AVG</span>(salary) <span class="sql-kw">AS</span> avg_salary,
    <span class="sql-fn">MAX</span>(salary) <span class="sql-kw">AS</span> highest_salary,
    <span class="sql-fn">MIN</span>(salary) <span class="sql-kw">AS</span> lowest_salary
<span class="sql-kw">FROM</span> Employees;

<span class="sql-cmt">-- GROUP BY — aggregate per group</span>
<span class="sql-kw">SELECT</span> dept,
    <span class="sql-fn">COUNT</span>(*) <span class="sql-kw">AS</span> headcount,
    <span class="sql-fn">AVG</span>(salary) <span class="sql-kw">AS</span> avg_sal,
    <span class="sql-fn">MAX</span>(salary) <span class="sql-kw">AS</span> max_sal
<span class="sql-kw">FROM</span> Employees
<span class="sql-kw">GROUP BY</span> dept;

<span class="sql-cmt">-- HAVING — filter groups (not rows)</span>
<span class="sql-kw">SELECT</span> dept, <span class="sql-fn">AVG</span>(salary) <span class="sql-kw">AS</span> avg_sal
<span class="sql-kw">FROM</span> Employees
<span class="sql-kw">GROUP BY</span> dept
<span class="sql-kw">HAVING</span> <span class="sql-fn">AVG</span>(salary) &gt; <span class="sql-num">60000</span>
<span class="sql-kw">ORDER BY</span> avg_sal <span class="sql-kw">DESC</span>;</div>
<div class="note-box">⚠️ <strong>WHERE vs HAVING:</strong> WHERE filters individual rows BEFORE grouping. HAVING filters groups AFTER GROUP BY. You cannot use aggregate functions in WHERE.</div>`,

'joins-inner':`<h2>INNER JOIN — Matching Rows Only</h2>
<p>INNER JOIN returns only rows where the join condition is TRUE in both tables. Rows without matches are excluded.</p>
<div class="code-block"><span class="sql-cmt">-- Basic INNER JOIN</span>
<span class="sql-kw">SELECT</span>
    s.student_id,
    s.name <span class="sql-kw">AS</span> student_name,
    c.title <span class="sql-kw">AS</span> course_title,
    e.grade
<span class="sql-kw">FROM</span> Students s
<span class="sql-kw">INNER JOIN</span> Enrollment e  <span class="sql-kw">ON</span> s.student_id = e.student_id
<span class="sql-kw">INNER JOIN</span> Courses c    <span class="sql-kw">ON</span> e.course_id  = c.course_id
<span class="sql-kw">WHERE</span> e.grade = <span class="sql-str">'A'</span>
<span class="sql-kw">ORDER BY</span> s.name;

<span class="sql-cmt">-- Classic interview: Find employees with their managers</span>
<span class="sql-kw">SELECT</span>
    e.name  <span class="sql-kw">AS</span> employee,
    m.name  <span class="sql-kw">AS</span> manager
<span class="sql-kw">FROM</span> Employees e
<span class="sql-kw">INNER JOIN</span> Employees m <span class="sql-kw">ON</span> e.manager_id = m.emp_id;</div>`,

'joins-outer':`<h2>LEFT, RIGHT & FULL OUTER JOIN</h2>
<div class="code-block"><span class="sql-cmt">-- LEFT JOIN: all from left + matching from right (NULL if no match)</span>
<span class="sql-kw">SELECT</span> c.name, o.order_id, o.total_amount
<span class="sql-kw">FROM</span> Customers c
<span class="sql-kw">LEFT JOIN</span> Orders o <span class="sql-kw">ON</span> c.customer_id = o.customer_id;
<span class="sql-cmt">-- Customers with NO orders will still appear (order columns = NULL)</span>

<span class="sql-cmt">-- Find customers who have NEVER placed an order</span>
<span class="sql-kw">SELECT</span> c.name
<span class="sql-kw">FROM</span> Customers c
<span class="sql-kw">LEFT JOIN</span> Orders o <span class="sql-kw">ON</span> c.customer_id = o.customer_id
<span class="sql-kw">WHERE</span> o.order_id <span class="sql-kw">IS NULL</span>;

<span class="sql-cmt">-- RIGHT JOIN: all from right + matching from left</span>
<span class="sql-kw">SELECT</span> e.name, d.dept_name
<span class="sql-kw">FROM</span> Employees e
<span class="sql-kw">RIGHT JOIN</span> Departments d <span class="sql-kw">ON</span> e.dept_id = d.dept_id;
<span class="sql-cmt">-- Departments with NO employees still appear</span>

<span class="sql-cmt">-- FULL OUTER JOIN (MySQL: emulate with UNION)</span>
<span class="sql-kw">SELECT</span> c.name, o.order_id <span class="sql-kw">FROM</span> Customers c <span class="sql-kw">LEFT JOIN</span>  Orders o <span class="sql-kw">ON</span> c.id = o.customer_id
<span class="sql-kw">UNION</span>
<span class="sql-kw">SELECT</span> c.name, o.order_id <span class="sql-kw">FROM</span> Customers c <span class="sql-kw">RIGHT JOIN</span> Orders o <span class="sql-kw">ON</span> c.id = o.customer_id;</div>`,

'joins-self':`<h2>SELF JOIN & CROSS JOIN</h2>
<div class="code-block"><span class="sql-cmt">-- SELF JOIN: join table with itself</span>
<span class="sql-cmt">-- Find all employees and their managers</span>
<span class="sql-kw">SELECT</span>
    e.name  <span class="sql-kw">AS</span> employee,
    m.name  <span class="sql-kw">AS</span> manager,
    e.salary <span class="sql-kw">AS</span> emp_salary
<span class="sql-kw">FROM</span> Employees e
<span class="sql-kw">LEFT JOIN</span> Employees m <span class="sql-kw">ON</span> e.manager_id = m.emp_id;

<span class="sql-cmt">-- Find pairs of students in same department</span>
<span class="sql-kw">SELECT</span> a.name <span class="sql-kw">AS</span> student1, b.name <span class="sql-kw">AS</span> student2, a.dept
<span class="sql-kw">FROM</span> Students a
<span class="sql-kw">JOIN</span> Students b <span class="sql-kw">ON</span> a.dept = b.dept <span class="sql-kw">AND</span> a.student_id &lt; b.student_id;

<span class="sql-cmt">-- CROSS JOIN: cartesian product (all combinations)</span>
<span class="sql-kw">SELECT</span> s.size, c.color
<span class="sql-kw">FROM</span> Sizes s <span class="sql-kw">CROSS JOIN</span> Colors c;
<span class="sql-cmt">-- Use case: generate all size-color combinations for products</span></div>`,

'joins-natural':`<h2>NATURAL JOIN & USING Clause</h2>
<div class="code-block"><span class="sql-cmt">-- NATURAL JOIN: automatically joins on same-named columns</span>
<span class="sql-kw">SELECT</span> * <span class="sql-kw">FROM</span> Students <span class="sql-kw">NATURAL JOIN</span> Enrollment;
<span class="sql-cmt">-- Joins on student_id (common column) automatically</span>
<span class="sql-cmt">-- Warning: Can be dangerous if unintended common columns exist</span>

<span class="sql-cmt">-- USING clause: explicit column name for join</span>
<span class="sql-kw">SELECT</span> s.name, c.title, e.grade
<span class="sql-kw">FROM</span> Students s
<span class="sql-kw">JOIN</span> Enrollment e <span class="sql-kw">USING</span> (student_id)
<span class="sql-kw">JOIN</span> Courses c    <span class="sql-kw">USING</span> (course_id);
<span class="sql-cmt">-- Cleaner than ON when column names match</span></div>`,

'subqueries':`<h2>Subqueries — Correlated & Non-Correlated</h2>
<div class="code-block"><span class="sql-cmt">-- Non-correlated subquery (independent, runs once)</span>
<span class="sql-kw">SELECT</span> name, salary
<span class="sql-kw">FROM</span> Employees
<span class="sql-kw">WHERE</span> salary &gt; (<span class="sql-kw">SELECT</span> <span class="sql-fn">AVG</span>(salary) <span class="sql-kw">FROM</span> Employees);

<span class="sql-cmt">-- Subquery in FROM (derived table / inline view)</span>
<span class="sql-kw">SELECT</span> dept, avg_sal
<span class="sql-kw">FROM</span> (
    <span class="sql-kw">SELECT</span> dept, <span class="sql-fn">AVG</span>(salary) <span class="sql-kw">AS</span> avg_sal
    <span class="sql-kw">FROM</span> Employees
    <span class="sql-kw">GROUP BY</span> dept
) <span class="sql-kw">AS</span> dept_avg
<span class="sql-kw">WHERE</span> avg_sal &gt; <span class="sql-num">70000</span>;

<span class="sql-cmt">-- Correlated subquery (references outer query, runs per row)</span>
<span class="sql-kw">SELECT</span> name, salary, dept
<span class="sql-kw">FROM</span> Employees e1
<span class="sql-kw">WHERE</span> salary = (
    <span class="sql-kw">SELECT</span> <span class="sql-fn">MAX</span>(salary)
    <span class="sql-kw">FROM</span> Employees e2
    <span class="sql-kw">WHERE</span> e2.dept = e1.dept  <span class="sql-cmt">-- references outer e1.dept</span>
);
<span class="sql-cmt">-- Finds highest earner in each department</span>

<span class="sql-cmt">-- Find 2nd highest salary (classic interview question)</span>
<span class="sql-kw">SELECT</span> <span class="sql-fn">MAX</span>(salary) <span class="sql-kw">AS</span> second_highest
<span class="sql-kw">FROM</span> Employees
<span class="sql-kw">WHERE</span> salary &lt; (<span class="sql-kw">SELECT</span> <span class="sql-fn">MAX</span>(salary) <span class="sql-kw">FROM</span> Employees);</div>`,

'set-ops':`<h2>UNION, INTERSECT, EXCEPT</h2>
<div class="code-block"><span class="sql-cmt">-- UNION: combine results, removes duplicates</span>
<span class="sql-kw">SELECT</span> name, email <span class="sql-kw">FROM</span> Students
<span class="sql-kw">UNION</span>
<span class="sql-kw">SELECT</span> name, email <span class="sql-kw">FROM</span> Alumni;

<span class="sql-cmt">-- UNION ALL: combine results, keeps duplicates (faster)</span>
<span class="sql-kw">SELECT</span> product_id <span class="sql-kw">FROM</span> Orders_2023
<span class="sql-kw">UNION ALL</span>
<span class="sql-kw">SELECT</span> product_id <span class="sql-kw">FROM</span> Orders_2024;

<span class="sql-cmt">-- INTERSECT: rows common to both (PostgreSQL/Oracle)</span>
<span class="sql-kw">SELECT</span> student_id <span class="sql-kw">FROM</span> CSE_Students
<span class="sql-kw">INTERSECT</span>
<span class="sql-kw">SELECT</span> student_id <span class="sql-kw">FROM</span> Scholarship_Winners;

<span class="sql-cmt">-- MySQL: emulate INTERSECT with INNER JOIN</span>
<span class="sql-kw">SELECT DISTINCT</span> a.student_id
<span class="sql-kw">FROM</span> CSE_Students a <span class="sql-kw">INNER JOIN</span> Scholarship_Winners b
<span class="sql-kw">ON</span> a.student_id = b.student_id;

<span class="sql-cmt">-- EXCEPT/MINUS: rows in first but not second</span>
<span class="sql-kw">SELECT</span> student_id <span class="sql-kw">FROM</span> Enrolled
<span class="sql-kw">EXCEPT</span>  <span class="sql-cmt">-- (use MINUS in Oracle)</span>
<span class="sql-kw">SELECT</span> student_id <span class="sql-kw">FROM</span> Passed;
<span class="sql-cmt">-- Students who enrolled but did NOT pass</span></div>`,

'exists-in':`<h2>EXISTS vs IN vs ANY vs ALL</h2>
<div class="code-block"><span class="sql-cmt">-- IN: value in a list or subquery result</span>
<span class="sql-kw">SELECT</span> * <span class="sql-kw">FROM</span> Students
<span class="sql-kw">WHERE</span> dept_id <span class="sql-kw">IN</span> (<span class="sql-kw">SELECT</span> dept_id <span class="sql-kw">FROM</span> Departments <span class="sql-kw">WHERE</span> building = <span class="sql-str">'Block A'</span>);

<span class="sql-cmt">-- EXISTS: true if subquery returns any row (correlated)</span>
<span class="sql-kw">SELECT</span> * <span class="sql-kw">FROM</span> Customers c
<span class="sql-kw">WHERE</span> <span class="sql-kw">EXISTS</span> (
    <span class="sql-kw">SELECT</span> <span class="sql-num">1</span> <span class="sql-kw">FROM</span> Orders o <span class="sql-kw">WHERE</span> o.customer_id = c.customer_id
);  <span class="sql-cmt">-- Customers who have placed at least one order</span>

<span class="sql-cmt">-- ANY: true if condition holds for any value in subquery</span>
<span class="sql-kw">SELECT</span> * <span class="sql-kw">FROM</span> Employees
<span class="sql-kw">WHERE</span> salary &gt; <span class="sql-kw">ANY</span> (<span class="sql-kw">SELECT</span> salary <span class="sql-kw">FROM</span> Employees <span class="sql-kw">WHERE</span> dept = <span class="sql-str">'HR'</span>);
<span class="sql-cmt">-- Employees earning more than AT LEAST ONE HR employee</span>

<span class="sql-cmt">-- ALL: true if condition holds for ALL values in subquery</span>
<span class="sql-kw">SELECT</span> * <span class="sql-kw">FROM</span> Employees
<span class="sql-kw">WHERE</span> salary &gt; <span class="sql-kw">ALL</span> (<span class="sql-kw">SELECT</span> salary <span class="sql-kw">FROM</span> Employees <span class="sql-kw">WHERE</span> dept = <span class="sql-str">'HR'</span>);
<span class="sql-cmt">-- Employees earning more than ALL HR employees</span></div>
<div class="tip-box">💡 <strong>Performance:</strong> EXISTS stops as soon as it finds one match — much faster than IN for large subquery results. Use EXISTS when you only care if a match exists.</div>`,

'views':`<h2>Views — CREATE, UPDATE, DROP</h2>
<p>A view is a virtual table based on a SELECT query. It doesn't store data — it's a saved query.</p>
<div class="code-block"><span class="sql-cmt">-- Create a view</span>
<span class="sql-kw">CREATE VIEW</span> HighEarners <span class="sql-kw">AS</span>
    <span class="sql-kw">SELECT</span> emp_id, name, dept, salary
    <span class="sql-kw">FROM</span> Employees
    <span class="sql-kw">WHERE</span> salary &gt; <span class="sql-num">80000</span>
    <span class="sql-kw">WITH CHECK OPTION</span>;  <span class="sql-cmt">-- prevents inserting rows that violate view condition</span>

<span class="sql-cmt">-- Use view like a table</span>
<span class="sql-kw">SELECT</span> * <span class="sql-kw">FROM</span> HighEarners <span class="sql-kw">WHERE</span> dept = <span class="sql-str">'CSE'</span>;

<span class="sql-cmt">-- Updatable view (single table, no GROUP BY/DISTINCT/JOIN)</span>
<span class="sql-kw">UPDATE</span> HighEarners <span class="sql-kw">SET</span> salary = <span class="sql-num">90000</span> <span class="sql-kw">WHERE</span> emp_id = <span class="sql-num">5</span>;

<span class="sql-cmt">-- Complex view for reporting</span>
<span class="sql-kw">CREATE VIEW</span> DeptSummary <span class="sql-kw">AS</span>
    <span class="sql-kw">SELECT</span> d.dept_name,
           <span class="sql-fn">COUNT</span>(e.emp_id) <span class="sql-kw">AS</span> headcount,
           <span class="sql-fn">AVG</span>(e.salary) <span class="sql-kw">AS</span> avg_salary,
           <span class="sql-fn">SUM</span>(e.salary) <span class="sql-kw">AS</span> total_payroll
    <span class="sql-kw">FROM</span> Departments d <span class="sql-kw">LEFT JOIN</span> Employees e <span class="sql-kw">ON</span> d.dept_id = e.dept_id
    <span class="sql-kw">GROUP BY</span> d.dept_name;

<span class="sql-kw">DROP VIEW IF EXISTS</span> HighEarners;
<span class="sql-kw">CREATE OR REPLACE VIEW</span> HighEarners <span class="sql-kw">AS</span> <span class="sql-kw">SELECT</span> ...</div>`,

'stored-procedures':`<h2>Stored Procedures & Functions</h2>
<div class="code-block"><span class="sql-cmt">-- Stored Procedure: returns nothing (or uses OUT params)</span>
<span class="sql-kw">DELIMITER</span> //
<span class="sql-kw">CREATE PROCEDURE</span> GetStudentsByDept(
    <span class="sql-kw">IN</span>  dept_name   <span class="sql-fn">VARCHAR</span>(<span class="sql-num">50</span>),
    <span class="sql-kw">OUT</span> total_count <span class="sql-fn">INT</span>
)
<span class="sql-kw">BEGIN</span>
    <span class="sql-kw">SELECT</span> * <span class="sql-kw">FROM</span> Students <span class="sql-kw">WHERE</span> dept = dept_name;
    <span class="sql-kw">SELECT</span> <span class="sql-fn">COUNT</span>(*) <span class="sql-kw">INTO</span> total_count <span class="sql-kw">FROM</span> Students <span class="sql-kw">WHERE</span> dept = dept_name;
<span class="sql-kw">END</span>//
<span class="sql-kw">DELIMITER</span> ;

<span class="sql-cmt">-- Call procedure</span>
<span class="sql-kw">CALL</span> GetStudentsByDept(<span class="sql-str">'CSE'</span>, @cnt);
<span class="sql-kw">SELECT</span> @cnt;

<span class="sql-cmt">-- Function: must return a value, used in SELECT</span>
<span class="sql-kw">DELIMITER</span> //
<span class="sql-kw">CREATE FUNCTION</span> GetGrade(score <span class="sql-fn">DECIMAL</span>(<span class="sql-num">5</span>,<span class="sql-num">2</span>)) <span class="sql-kw">RETURNS</span> <span class="sql-fn">CHAR</span>(<span class="sql-num">2</span>)
<span class="sql-kw">DETERMINISTIC</span>
<span class="sql-kw">BEGIN</span>
    <span class="sql-kw">RETURN CASE</span>
        <span class="sql-kw">WHEN</span> score &gt;= <span class="sql-num">90</span> <span class="sql-kw">THEN</span> <span class="sql-str">'A+'</span>
        <span class="sql-kw">WHEN</span> score &gt;= <span class="sql-num">80</span> <span class="sql-kw">THEN</span> <span class="sql-str">'A'</span>
        <span class="sql-kw">WHEN</span> score &gt;= <span class="sql-num">70</span> <span class="sql-kw">THEN</span> <span class="sql-str">'B'</span>
        <span class="sql-kw">ELSE</span> <span class="sql-str">'C'</span>
    <span class="sql-kw">END</span>;
<span class="sql-kw">END</span>//
<span class="sql-kw">DELIMITER</span> ;

<span class="sql-kw">SELECT</span> name, marks, <span class="sql-fn">GetGrade</span>(marks) <span class="sql-kw">AS</span> grade <span class="sql-kw">FROM</span> ExamResults;</div>`,

'triggers':`<h2>Triggers — BEFORE & AFTER</h2>
<div class="code-block"><span class="sql-cmt">-- BEFORE INSERT trigger: validate data before inserting</span>
<span class="sql-kw">DELIMITER</span> //
<span class="sql-kw">CREATE TRIGGER</span> before_student_insert
<span class="sql-kw">BEFORE INSERT ON</span> Students
<span class="sql-kw">FOR EACH ROW</span>
<span class="sql-kw">BEGIN</span>
    <span class="sql-kw">IF</span> NEW.cgpa &lt; <span class="sql-num">0</span> <span class="sql-kw">OR</span> NEW.cgpa &gt; <span class="sql-num">10</span> <span class="sql-kw">THEN</span>
        <span class="sql-kw">SIGNAL SQLSTATE</span> <span class="sql-str">'45000'</span>
        <span class="sql-kw">SET</span> MESSAGE_TEXT = <span class="sql-str">'CGPA must be between 0 and 10'</span>;
    <span class="sql-kw">END IF</span>;
<span class="sql-kw">END</span>//
<span class="sql-kw">DELIMITER</span> ;

<span class="sql-cmt">-- AFTER UPDATE trigger: audit log</span>
<span class="sql-kw">DELIMITER</span> //
<span class="sql-kw">CREATE TRIGGER</span> after_salary_update
<span class="sql-kw">AFTER UPDATE ON</span> Employees
<span class="sql-kw">FOR EACH ROW</span>
<span class="sql-kw">BEGIN</span>
    <span class="sql-kw">IF</span> OLD.salary &lt;&gt; NEW.salary <span class="sql-kw">THEN</span>
        <span class="sql-kw">INSERT INTO</span> SalaryAudit (emp_id, old_salary, new_salary, changed_at)
        <span class="sql-kw">VALUES</span> (NEW.emp_id, OLD.salary, NEW.salary, <span class="sql-fn">NOW</span>());
    <span class="sql-kw">END IF</span>;
<span class="sql-kw">END</span>//
<span class="sql-kw">DELIMITER</span> ;</div>`,

'window-functions':`<h2>ROW_NUMBER, RANK, DENSE_RANK</h2>
<div class="code-block"><span class="sql-cmt">-- ROW_NUMBER: unique sequential number per partition</span>
<span class="sql-kw">SELECT</span>
    name, dept, salary,
    <span class="sql-fn">ROW_NUMBER</span>() <span class="sql-kw">OVER</span> (<span class="sql-kw">PARTITION BY</span> dept <span class="sql-kw">ORDER BY</span> salary <span class="sql-kw">DESC</span>) <span class="sql-kw">AS</span> row_num
<span class="sql-kw">FROM</span> Employees;

<span class="sql-cmt">-- RANK: same value gets same rank, gaps after ties</span>
<span class="sql-cmt">-- DENSE_RANK: same value gets same rank, NO gaps</span>
<span class="sql-kw">SELECT</span>
    name, dept, salary,
    <span class="sql-fn">RANK</span>()       <span class="sql-kw">OVER</span> (<span class="sql-kw">ORDER BY</span> salary <span class="sql-kw">DESC</span>) <span class="sql-kw">AS</span> rnk,
    <span class="sql-fn">DENSE_RANK</span>() <span class="sql-kw">OVER</span> (<span class="sql-kw">ORDER BY</span> salary <span class="sql-kw">DESC</span>) <span class="sql-kw">AS</span> dense_rnk
<span class="sql-kw">FROM</span> Employees;
<span class="sql-cmt">-- Example: salary 90k,90k,70k → RANK: 1,1,3 | DENSE_RANK: 1,1,2</span>

<span class="sql-cmt">-- Find top 3 earners per department</span>
<span class="sql-kw">SELECT</span> * <span class="sql-kw">FROM</span> (
    <span class="sql-kw">SELECT</span> name, dept, salary,
           <span class="sql-fn">DENSE_RANK</span>() <span class="sql-kw">OVER</span> (<span class="sql-kw">PARTITION BY</span> dept <span class="sql-kw">ORDER BY</span> salary <span class="sql-kw">DESC</span>) dr
    <span class="sql-kw">FROM</span> Employees
) ranked
<span class="sql-kw">WHERE</span> dr &lt;= <span class="sql-num">3</span>;</div>`,

'aggregate-window':`<h2>Aggregate Window Functions</h2>
<div class="code-block"><span class="sql-cmt">-- Running total (cumulative sum)</span>
<span class="sql-kw">SELECT</span>
    order_date,
    amount,
    <span class="sql-fn">SUM</span>(amount) <span class="sql-kw">OVER</span> (<span class="sql-kw">ORDER BY</span> order_date) <span class="sql-kw">AS</span> running_total
<span class="sql-kw">FROM</span> Orders;

<span class="sql-cmt">-- Department salary as % of total company salary</span>
<span class="sql-kw">SELECT</span>
    name, dept, salary,
    <span class="sql-fn">ROUND</span>(salary * <span class="sql-num">100.0</span> / <span class="sql-fn">SUM</span>(salary) <span class="sql-kw">OVER</span>(), <span class="sql-num">2</span>) <span class="sql-kw">AS</span> pct_of_total
<span class="sql-kw">FROM</span> Employees;

<span class="sql-cmt">-- LAG/LEAD: access previous/next row values</span>
<span class="sql-kw">SELECT</span>
    month, revenue,
    <span class="sql-fn">LAG</span>(revenue, <span class="sql-num">1</span>) <span class="sql-kw">OVER</span> (<span class="sql-kw">ORDER BY</span> month) <span class="sql-kw">AS</span> prev_month_rev,
    revenue - <span class="sql-fn">LAG</span>(revenue, <span class="sql-num">1</span>) <span class="sql-kw">OVER</span> (<span class="sql-kw">ORDER BY</span> month) <span class="sql-kw">AS</span> growth
<span class="sql-kw">FROM</span> MonthlyRevenue;</div>`,

'cte':`<h2>Common Table Expressions (WITH Clause)</h2>
<div class="code-block"><span class="sql-cmt">-- Basic CTE</span>
<span class="sql-kw">WITH</span> HighEarners <span class="sql-kw">AS</span> (
    <span class="sql-kw">SELECT</span> * <span class="sql-kw">FROM</span> Employees <span class="sql-kw">WHERE</span> salary &gt; <span class="sql-num">80000</span>
)
<span class="sql-kw">SELECT</span> dept, <span class="sql-fn">COUNT</span>(*) <span class="sql-kw">FROM</span> HighEarners <span class="sql-kw">GROUP BY</span> dept;

<span class="sql-cmt">-- Multiple CTEs</span>
<span class="sql-kw">WITH</span>
DeptAvg <span class="sql-kw">AS</span> (
    <span class="sql-kw">SELECT</span> dept, <span class="sql-fn">AVG</span>(salary) avg_sal <span class="sql-kw">FROM</span> Employees <span class="sql-kw">GROUP BY</span> dept
),
AboveAvg <span class="sql-kw">AS</span> (
    <span class="sql-kw">SELECT</span> e.*, d.avg_sal
    <span class="sql-kw">FROM</span> Employees e <span class="sql-kw">JOIN</span> DeptAvg d <span class="sql-kw">ON</span> e.dept = d.dept
    <span class="sql-kw">WHERE</span> e.salary &gt; d.avg_sal
)
<span class="sql-kw">SELECT</span> * <span class="sql-kw">FROM</span> AboveAvg;

<span class="sql-cmt">-- Recursive CTE: traverse hierarchies</span>
<span class="sql-kw">WITH RECURSIVE</span> OrgHierarchy <span class="sql-kw">AS</span> (
    <span class="sql-kw">SELECT</span> emp_id, name, manager_id, <span class="sql-num">0</span> <span class="sql-kw">AS</span> level
    <span class="sql-kw">FROM</span> Employees <span class="sql-kw">WHERE</span> manager_id <span class="sql-kw">IS NULL</span>  <span class="sql-cmt">-- anchor: top of tree</span>
    <span class="sql-kw">UNION ALL</span>
    <span class="sql-kw">SELECT</span> e.emp_id, e.name, e.manager_id, h.level + <span class="sql-num">1</span>
    <span class="sql-kw">FROM</span> Employees e <span class="sql-kw">JOIN</span> OrgHierarchy h <span class="sql-kw">ON</span> e.manager_id = h.emp_id
)
<span class="sql-kw">SELECT</span> * <span class="sql-kw">FROM</span> OrgHierarchy <span class="sql-kw">ORDER BY</span> level;</div>`,

'functional-dependency':`<h2>Functional Dependencies</h2>
<p>A functional dependency X → Y means: if two tuples have same X values, they must have same Y values. "X determines Y".</p>
<table><tr><th>Type</th><th>Description</th><th>Example</th></tr>
<tr><td>Trivial FD</td><td>Y ⊆ X (Y is subset of X)</td><td>{A,B} → {A} is trivial</td></tr>
<tr><td>Non-Trivial FD</td><td>Y ⊄ X (Y not subset of X)</td><td>StudentID → Name</td></tr>
<tr><td>Fully FD</td><td>Y depends on ALL of X</td><td>{StudentID,CourseID} → Grade</td></tr>
<tr><td>Partial FD</td><td>Y depends on PART of X</td><td>{StudentID,CourseID} → StudentName (only needs StudentID)</td></tr>
<tr><td>Transitive FD</td><td>X→Y→Z (Z depends on Y, Y on X)</td><td>StudentID→DeptID→DeptName</td></tr></table>`,

'1nf':`<h2>First Normal Form (1NF)</h2>
<p>A relation is in 1NF if:<br>• All attributes are <strong>atomic</strong> (indivisible)<br>• No repeating groups or arrays<br>• Each column has a <strong>single value</strong></p>
<div class="warning-box">❌ <strong>Violates 1NF:</strong><br>Student(StudentID, Name, <u>Courses</u>) where Courses = "Math, Physics, CS"<br>→ Courses is multivalued — NOT atomic!</div>
<div class="example-box">✅ <strong>1NF Fix:</strong><br>Student(StudentID, Name)<br>StudentCourse(StudentID, CourseName)<br>→ Now each attribute is atomic</div>`,

'2nf':`<h2>Second Normal Form (2NF)</h2>
<p>A relation is in 2NF if:<br>• It is in 1NF<br>• No <strong>partial dependency</strong> (every non-prime attribute fully depends on the entire primary key)</p>
<p>2NF only matters when the primary key is <strong>composite</strong>.</p>
<div class="warning-box">❌ <strong>Violates 2NF:</strong><br>
Table: Enrollment(<u>StudentID, CourseID</u>, StudentName, Grade)<br>
FD: StudentID → StudentName (partial dependency! StudentName depends only on part of PK)</div>
<div class="example-box">✅ <strong>2NF Fix — Decompose:</strong><br>
Student(<u>StudentID</u>, StudentName)<br>
Enrollment(<u>StudentID, CourseID</u>, Grade)</div>`,

'3nf':`<h2>Third Normal Form (3NF)</h2>
<p>A relation is in 3NF if:<br>• It is in 2NF<br>• No <strong>transitive dependency</strong> (non-prime attribute depends on another non-prime attribute)</p>
<div class="warning-box">❌ <strong>Violates 3NF:</strong><br>
Student(<u>StudentID</u>, Name, DeptID, DeptName)<br>
FD: DeptID → DeptName (DeptName transitively depends on StudentID through DeptID)</div>
<div class="example-box">✅ <strong>3NF Fix — Decompose:</strong><br>
Student(<u>StudentID</u>, Name, DeptID)<br>
Department(<u>DeptID</u>, DeptName)</div>`,

'bcnf':`<h2>BCNF — Boyce-Codd Normal Form</h2>
<p>A stricter version of 3NF. For every FD X → Y, X must be a <strong>super key</strong>. Every determinant must be a candidate key.</p>
<div class="warning-box">❌ <strong>Violates BCNF (but is in 3NF):</strong><br>
CourseAllocation(<u>Student, Course</u>, Teacher)<br>
FDs: {Student,Course}→Teacher, Teacher→Course<br>
Teacher is NOT a super key but determines Course!</div>
<div class="example-box">✅ <strong>BCNF Fix:</strong><br>
TeacherCourse(<u>Teacher</u>, Course)<br>
StudentTeacher(<u>Student, Teacher</u>)</div>
<table><tr><th></th><th>3NF</th><th>BCNF</th></tr>
<tr><td>Lossless join</td><td>Always</td><td>Always</td></tr>
<tr><td>Dependency preservation</td><td>Always</td><td>Not always</td></tr>
<tr><td>Redundancy</td><td>Some allowed</td><td>More strict</td></tr></table>`,

'4nf-5nf':`<h2>4NF & 5NF</h2>
<h3>4NF — No Multi-Valued Dependencies (MVD)</h3>
<p>A relation is in 4NF if it is in BCNF and has no non-trivial multi-valued dependencies.</p>
<div class="example-box"><strong>MVD Example:</strong><br>
Employee(<u>EmpID</u>, Skill, Language)<br>
EmpID →→ Skill (employee has multiple skills independently of languages)<br>
EmpID →→ Language<br><br>
✅ Fix: Split into Employee_Skills(EmpID, Skill) and Employee_Languages(EmpID, Language)</div>
<h3>5NF — No Join Dependencies</h3>
<p>A relation is in 5NF (PJNF) if it cannot be decomposed further without loss. Rarely needed in practice.</p>`,

'lossless-join':`<h2>Lossless-Join Decomposition</h2>
<p>A decomposition R → (R1, R2) is lossless if R1 ∩ R2 → R1 or R1 ∩ R2 → R2 (the common attribute is a key in one of the decomposed tables).</p>
<div class="code-block"><span class="sql-cmt">-- Original: Employee(EmpID, DeptID, DeptName)</span>
<span class="sql-cmt">-- Decomposition:</span>
<span class="sql-cmt">--   R1 = Employee(EmpID, DeptID)</span>
<span class="sql-cmt">--   R2 = Department(DeptID, DeptName)</span>
<span class="sql-cmt">-- R1 ∩ R2 = {DeptID}</span>
<span class="sql-cmt">-- DeptID → DeptName (DeptID is PK of R2) → LOSSLESS ✅</span>

<span class="sql-cmt">-- To verify: natural join R1 ⋈ R2 must equal R</span>
<span class="sql-kw">SELECT</span> e.EmpID, e.DeptID, d.DeptName
<span class="sql-kw">FROM</span> Employee e <span class="sql-kw">NATURAL JOIN</span> Department d;
<span class="sql-cmt">-- Should return exactly the original Employee table</span></div>`,

'dependency-preservation':`<h2>Dependency Preservation</h2>
<p>A decomposition preserves all functional dependencies if every FD in the original schema can be verified using only one of the decomposed tables (without joining).</p>
<div class="note-box">📌 BCNF sometimes violates dependency preservation. In that case, we may prefer 3NF (which always preserves dependencies) over BCNF.</div>`,

'denormalization':`<h2>Denormalization — When & Why</h2>
<p>Denormalization is intentionally introducing redundancy to improve read performance.</p>
<table><tr><th>Scenario</th><th>Normalization</th><th>Denormalization</th></tr>
<tr><td>Write-heavy workload</td><td>Preferred</td><td>Avoid (extra writes)</td></tr>
<tr><td>Read-heavy / reporting</td><td>Slower (many JOINs)</td><td>Preferred (fewer JOINs)</td></tr>
<tr><td>Data warehouse</td><td>Less common</td><td>Star/Snowflake schema</td></tr></table>
<div class="tip-box">💡 Most production databases are a mix — normalized for transactional tables, denormalized for analytics/reporting tables (OLAP).</div>`,

'transaction-basics':`<h2>Transaction Concept & ACID Properties</h2>
<p>A <strong>transaction</strong> is a unit of work that is performed as a single logical operation — either all statements succeed or none do.</p>
<div class="code-block"><span class="sql-cmt">-- Bank transfer: debit A, credit B (must be atomic)</span>
<span class="sql-kw">START TRANSACTION</span>;
<span class="sql-kw">UPDATE</span> Accounts <span class="sql-kw">SET</span> balance = balance - <span class="sql-num">1000</span> <span class="sql-kw">WHERE</span> acc_no = <span class="sql-str">'A101'</span>;
<span class="sql-kw">UPDATE</span> Accounts <span class="sql-kw">SET</span> balance = balance + <span class="sql-num">1000</span> <span class="sql-kw">WHERE</span> acc_no = <span class="sql-str">'B202'</span>;
<span class="sql-kw">COMMIT</span>;  <span class="sql-cmt">-- Both updates saved permanently</span>
<span class="sql-cmt">-- If error occurs before COMMIT:</span>
<span class="sql-kw">ROLLBACK</span>;  <span class="sql-cmt">-- Both updates undone</span></div>
<table><tr><th>Property</th><th>Meaning</th><th>Guarantee</th></tr>
<tr><td><strong>Atomicity</strong></td><td>All or nothing</td><td>Transaction fully completes or fully undone</td></tr>
<tr><td><strong>Consistency</strong></td><td>Valid state → valid state</td><td>DB constraints never violated</td></tr>
<tr><td><strong>Isolation</strong></td><td>Concurrent transactions appear serial</td><td>Intermediate states not visible to others</td></tr>
<tr><td><strong>Durability</strong></td><td>Committed = permanent</td><td>Survives crashes, power failures</td></tr></table>`,

'concurrency-problems':`<h2>Concurrency Problems</h2>
<table><tr><th>Problem</th><th>Description</th><th>Example</th></tr>
<tr><td><strong>Dirty Read</strong></td><td>Read uncommitted data that gets rolled back</td><td>T1 reads T2's balance before T2's ROLLBACK</td></tr>
<tr><td><strong>Lost Update</strong></td><td>Two transactions overwrite each other</td><td>T1 and T2 both read qty=10, both write qty=9. One update lost.</td></tr>
<tr><td><strong>Non-Repeatable Read</strong></td><td>Same query gives different results within one transaction</td><td>T1 reads salary=50k; T2 updates to 60k; T1 reads again → 60k</td></tr>
<tr><td><strong>Phantom Read</strong></td><td>New rows appear in re-read due to another transaction's INSERT</td><td>T1 counts employees = 10; T2 inserts one; T1 counts again → 11</td></tr></table>`,

'isolation-levels':`<h2>Transaction Isolation Levels</h2>
<table><tr><th>Isolation Level</th><th>Dirty Read</th><th>Non-Repeatable</th><th>Phantom</th></tr>
<tr><td>READ UNCOMMITTED</td><td>❌ Possible</td><td>❌ Possible</td><td>❌ Possible</td></tr>
<tr><td>READ COMMITTED</td><td>✅ Prevented</td><td>❌ Possible</td><td>❌ Possible</td></tr>
<tr><td>REPEATABLE READ</td><td>✅ Prevented</td><td>✅ Prevented</td><td>❌ Possible</td></tr>
<tr><td>SERIALIZABLE</td><td>✅ Prevented</td><td>✅ Prevented</td><td>✅ Prevented</td></tr></table>
<div class="code-block"><span class="sql-cmt">-- Set isolation level for current session</span>
<span class="sql-kw">SET SESSION TRANSACTION ISOLATION LEVEL</span> REPEATABLE READ;
<span class="sql-kw">START TRANSACTION</span>;
<span class="sql-cmt">-- MySQL InnoDB default: REPEATABLE READ</span></div>`,

'lock-protocols':`<h2>Lock-Based Protocols — 2PL</h2>
<p>The <strong>Two-Phase Locking (2PL)</strong> protocol ensures conflict-serializability.</p>
<table><tr><th>Phase</th><th>Description</th></tr>
<tr><td>Growing Phase</td><td>Transaction may acquire locks but NOT release any</td></tr>
<tr><td>Shrinking Phase</td><td>Transaction may release locks but NOT acquire new ones</td></tr></table>
<table><tr><th>Protocol</th><th>Deadlock?</th><th>Cascading Rollback?</th></tr>
<tr><td>Basic 2PL</td><td>Possible</td><td>Possible</td></tr>
<tr><td>Strict 2PL</td><td>Possible</td><td>Not possible (holds X-locks till end)</td></tr>
<tr><td>Rigorous 2PL</td><td>Possible</td><td>Not possible (holds all locks till end)</td></tr></table>`,

'recovery-techniques':`<h2>Recovery Techniques</h2>
<h3>Log-Based Recovery</h3>
<p>Every database modification is logged before being applied. Log records: &lt;T, X, old_value, new_value&gt;</p>
<div class="code-block"><span class="sql-cmt">-- Log entries for bank transfer T1</span>
&lt;T1, start&gt;
&lt;T1, A.balance, 5000, 4000&gt;  <span class="sql-cmt">-- debit 1000</span>
&lt;T1, B.balance, 2000, 3000&gt;  <span class="sql-cmt">-- credit 1000</span>
&lt;T1, commit&gt;

<span class="sql-cmt">-- Recovery after crash:</span>
<span class="sql-cmt">-- If T1 committed → REDO: apply new_values</span>
<span class="sql-cmt">-- If T1 not committed → UNDO: restore old_values</span></div>`,

'undo-redo':`<h2>Undo & Redo Operations</h2>
<table><tr><th>Operation</th><th>When Used</th><th>Action</th></tr>
<tr><td>UNDO</td><td>Transaction NOT committed before crash</td><td>Restore old values from log</td></tr>
<tr><td>REDO</td><td>Transaction committed but changes not on disk</td><td>Re-apply new values from log</td></tr></table>
<div class="tip-box">💡 <strong>Write-Ahead Logging (WAL):</strong> Log record must be written to stable storage BEFORE the actual database write. This ensures recovery is always possible.</div>`,

'deadlock-db':`<h2>Deadlock Handling in Databases</h2>
<table><tr><th>Strategy</th><th>Approach</th></tr>
<tr><td>Prevention (Timestamp-based)</td><td>Wait-Die or Wound-Wait schemes using timestamps</td></tr>
<tr><td>Detection</td><td>Build wait-for graph; cycle = deadlock → abort one transaction</td></tr>
<tr><td>Timeout</td><td>If transaction waits too long, assume deadlock and abort</td></tr></table>
<div class="code-block"><span class="sql-cmt">-- MySQL deadlock detection (automatic)</span>
<span class="sql-cmt">-- InnoDB detects cycles in wait-for graph and rolls back smaller transaction</span>
<span class="sql-cmt">-- Check for deadlocks:</span>
<span class="sql-kw">SHOW ENGINE</span> INNODB STATUS;
<span class="sql-cmt">-- Shows latest deadlock details</span></div>`,

'index-basics':`<h2>What is an Index? Dense vs Sparse</h2>
<p>An index is a data structure that improves the speed of data retrieval. Like a book's index — find the right page without reading every page.</p>
<table><tr><th></th><th>Dense Index</th><th>Sparse Index</th></tr>
<tr><td>Index entry for</td><td>Every search key value</td><td>Some search key values</td></tr>
<tr><td>Space</td><td>More space</td><td>Less space</td></tr>
<tr><td>Requirement</td><td>Works for any file</td><td>Data must be sorted</td></tr>
<tr><td>Speed</td><td>Faster</td><td>Slightly slower (need to scan)</td></tr></table>`,

'btree-index':`<h2>B-Tree & B+ Tree Indexing</h2>
<table><tr><th></th><th>B-Tree</th><th>B+ Tree</th></tr>
<tr><td>Data in</td><td>All nodes (internal + leaf)</td><td>Only leaf nodes</td></tr>
<tr><td>Leaf links</td><td>No links between leaves</td><td>Leaves linked as linked list</td></tr>
<tr><td>Range queries</td><td>Slower</td><td>Faster (traverse leaf list)</td></tr>
<tr><td>Space efficiency</td><td>Less efficient</td><td>More efficient</td></tr>
<tr><td>Used in</td><td>Filesystem directories</td><td>Most DBMS (MySQL InnoDB)</td></tr></table>
<div class="tip-box">💡 MySQL InnoDB uses B+ Trees for ALL indexes. The primary key index stores actual row data in leaves (clustered index). Secondary indexes store the primary key value in leaves.</div>`,

'clustered-nonclustered':`<h2>Clustered vs Non-Clustered Index</h2>
<table><tr><th></th><th>Clustered Index</th><th>Non-Clustered Index</th></tr>
<tr><td>Data order</td><td>Data physically sorted by index key</td><td>Index stored separately from data</td></tr>
<tr><td>Count per table</td><td>Only 1 (data can only be sorted one way)</td><td>Multiple allowed</td></tr>
<tr><td>Leaf nodes contain</td><td>Actual row data</td><td>Pointer (row ID / PK) to actual row</td></tr>
<tr><td>Created on</td><td>PRIMARY KEY (automatically)</td><td>Any column(s) explicitly</td></tr>
<tr><td>Speed (range queries)</td><td>Faster</td><td>Slower (double lookup)</td></tr></table>
<div class="code-block"><span class="sql-cmt">-- Clustered index (MySQL: PK is always clustered)</span>
<span class="sql-kw">CREATE TABLE</span> Products (
    product_id <span class="sql-fn">INT</span> <span class="sql-kw">PRIMARY KEY</span>,  <span class="sql-cmt">-- clustered index auto-created</span>
    name <span class="sql-fn">VARCHAR</span>(<span class="sql-num">100</span>)
);

<span class="sql-cmt">-- Non-clustered indexes</span>
<span class="sql-kw">CREATE INDEX</span> idx_name <span class="sql-kw">ON</span> Products(name);
<span class="sql-kw">CREATE INDEX</span> idx_cat_price <span class="sql-kw">ON</span> Products(category, price);  <span class="sql-cmt">-- composite</span></div>`,

'composite-index':`<h2>Composite & Covering Index</h2>
<div class="code-block"><span class="sql-cmt">-- Composite index (multi-column)</span>
<span class="sql-kw">CREATE INDEX</span> idx_dept_salary <span class="sql-kw">ON</span> Employees(dept, salary);
<span class="sql-cmt">-- Works for: WHERE dept = ?</span>
<span class="sql-cmt">--            WHERE dept = ? AND salary > ?</span>
<span class="sql-cmt">-- Does NOT use index: WHERE salary > ? (leftmost prefix rule!)</span>

<span class="sql-cmt">-- Covering Index: index contains ALL columns needed by query</span>
<span class="sql-kw">CREATE INDEX</span> idx_covering <span class="sql-kw">ON</span> Employees(dept, salary, name);
<span class="sql-cmt">-- This query uses index-only scan (no table access needed):</span>
<span class="sql-kw">SELECT</span> name, salary <span class="sql-kw">FROM</span> Employees <span class="sql-kw">WHERE</span> dept = <span class="sql-str">'CSE'</span>;</div>
<div class="tip-box">💡 <strong>Leftmost Prefix Rule:</strong> A composite index on (A, B, C) can be used for queries filtering on (A), (A,B), or (A,B,C) — but NOT on (B) or (B,C) alone.</div>`,

'query-processing':`<h2>Query Processing Steps</h2>
<ol>
<li><strong>Parsing & Translation:</strong> SQL text → parse tree → relational algebra expression</li>
<li><strong>Optimization:</strong> Query optimizer generates multiple execution plans, estimates cost, picks cheapest</li>
<li><strong>Evaluation:</strong> Execution engine runs the chosen plan</li>
</ol>
<div class="code-block"><span class="sql-cmt">-- EXPLAIN shows execution plan</span>
<span class="sql-kw">EXPLAIN SELECT</span> s.name, c.title
<span class="sql-kw">FROM</span> Students s <span class="sql-kw">JOIN</span> Enrollment e <span class="sql-kw">ON</span> s.student_id = e.student_id
<span class="sql-kw">JOIN</span> Courses c <span class="sql-kw">ON</span> e.course_id = c.course_id
<span class="sql-kw">WHERE</span> s.dept = <span class="sql-str">'CSE'</span>;
<span class="sql-cmt">-- Shows: type, key used, rows scanned, Extra info</span>

<span class="sql-kw">EXPLAIN ANALYZE</span> <span class="sql-kw">SELECT</span> ...;  <span class="sql-cmt">-- Actually runs query + shows actual rows/time</span></div>`,

'query-optimization':`<h2>Query Optimization Techniques</h2>
<table><tr><th>Technique</th><th>Description</th></tr>
<tr><td>Index usage</td><td>Add indexes on WHERE, JOIN, ORDER BY columns</td></tr>
<tr><td>Push selections down</td><td>Filter rows as early as possible (before join)</td></tr>
<tr><td>Avoid SELECT *</td><td>Fetch only needed columns → smaller I/O</td></tr>
<tr><td>Avoid functions on indexed columns in WHERE</td><td>WHERE YEAR(date) = 2024 prevents index use; use WHERE date BETWEEN ... instead</td></tr>
<tr><td>Use LIMIT</td><td>Fetch only what you need</td></tr>
<tr><td>Batch updates</td><td>Use bulk INSERT instead of row-by-row</td></tr></table>
<div class="code-block"><span class="sql-cmt">-- Bad: function on indexed column prevents index use</span>
<span class="sql-kw">SELECT</span> * <span class="sql-kw">FROM</span> Orders <span class="sql-kw">WHERE</span> <span class="sql-fn">YEAR</span>(order_date) = <span class="sql-num">2024</span>;  <span class="sql-cmt">-- ❌ full scan</span>

<span class="sql-cmt">-- Good: range condition uses index</span>
<span class="sql-kw">SELECT</span> * <span class="sql-kw">FROM</span> Orders
<span class="sql-kw">WHERE</span> order_date <span class="sql-kw">BETWEEN</span> <span class="sql-str">'2024-01-01'</span> <span class="sql-kw">AND</span> <span class="sql-str">'2024-12-31'</span>;  <span class="sql-cmt">-- ✅ index scan</span>

<span class="sql-cmt">-- Bad: implicit type conversion</span>
<span class="sql-kw">SELECT</span> * <span class="sql-kw">FROM</span> Users <span class="sql-kw">WHERE</span> phone = <span class="sql-num">9876543210</span>;  <span class="sql-cmt">-- phone is VARCHAR</span>
<span class="sql-cmt">-- Good:</span>
<span class="sql-kw">SELECT</span> * <span class="sql-kw">FROM</span> Users <span class="sql-kw">WHERE</span> phone = <span class="sql-str">'9876543210'</span>;</div>`,

'nosql-intro':`<h2>NoSQL vs SQL — When to Use Which</h2>
<table><tr><th>Criterion</th><th>SQL (Relational)</th><th>NoSQL</th></tr>
<tr><td>Schema</td><td>Fixed, predefined</td><td>Flexible, dynamic</td></tr>
<tr><td>Scaling</td><td>Vertical (scale up)</td><td>Horizontal (scale out)</td></tr>
<tr><td>Consistency</td><td>ACID guaranteed</td><td>Eventual consistency (BASE)</td></tr>
<tr><td>Relationships</td><td>JOINs across tables</td><td>Denormalized / embedded docs</td></tr>
<tr><td>Best for</td><td>Transactions, ERP, banking</td><td>Social feeds, IoT, big data</td></tr>
<tr><td>Examples</td><td>MySQL, PostgreSQL, Oracle</td><td>MongoDB, Cassandra, Redis, DynamoDB</td></tr></table>
<div class="tip-box">💡 <strong>CAP Theorem:</strong> A distributed system can guarantee only 2 of: Consistency, Availability, Partition Tolerance. SQL databases typically choose CP; many NoSQL choose AP.</div>`,

'transaction-states':`<h2>Transaction States</h2>
<p>Active → Partially Committed → Committed (success path)<br>Active → Failed → Aborted (failure path)</p>
<table><tr><th>State</th><th>Description</th></tr>
<tr><td>Active</td><td>Transaction is executing</td></tr>
<tr><td>Partially Committed</td><td>Last statement executed, not yet written to disk</td></tr>
<tr><td>Failed</td><td>Normal execution cannot proceed</td></tr>
<tr><td>Aborted</td><td>Rolled back, database restored to prior state</td></tr>
<tr><td>Committed</td><td>Transaction completed successfully, changes permanent</td></tr></table>`,

'schedule-types':`<h2>Serial vs Concurrent Schedules</h2>
<table><tr><th>Schedule Type</th><th>Description</th></tr>
<tr><td>Serial</td><td>Transactions execute one after another — no interleaving (safe but slow)</td></tr>
<tr><td>Concurrent</td><td>Transactions interleaved — better performance but can cause anomalies</td></tr>
<tr><td>Serializable</td><td>Concurrent schedule equivalent to some serial schedule — ideal</td></tr>
<tr><td>Conflict Serializable</td><td>Can be made serial by swapping non-conflicting operations</td></tr>
<tr><td>View Serializable</td><td>Produces same final result as a serial schedule</td></tr></table>`,

'serializability':`<h2>Conflict & View Serializability</h2>
<p><strong>Conflicting operations:</strong> Two operations conflict if they belong to different transactions, access same data item, and at least one is a write.</p>
<div class="example-box"><strong>Precedence Graph Test:</strong><br>
1. Create node for each transaction<br>
2. Add edge Ti → Tj if Ti's operation conflicts with and precedes Tj's<br>
3. If no cycle → conflict serializable ✅<br>
4. If cycle → NOT conflict serializable ❌</div>`,

'static-hashing':`<h2>Static Hashing</h2>
<p>Maps a search key to a bucket using a hash function. h(key) = key mod B where B = number of buckets.</p>
<table><tr><th>Pros</th><th>Cons</th></tr>
<tr><td>O(1) average lookup</td><td>Fixed number of buckets</td></tr>
<tr><td>Fast exact-match queries</td><td>Poor for range queries</td></tr>
<tr><td>Simple implementation</td><td>Overflow if too many keys per bucket</td></tr></table>`,

'dynamic-hashing':`<h2>Dynamic / Extendible Hashing</h2>
<p>Allows the hash table to grow/shrink dynamically without rehashing all keys.</p>
<div class="example-box"><strong>Extendible Hashing:</strong><br>
• Uses a directory with global depth d<br>
• Each bucket has local depth<br>
• On overflow: split bucket, double directory if needed<br>
• O(1) average lookup regardless of size</div>`,

'hash-collision':`<h2>Hash Collision & Overflow</h2>
<table><tr><th>Resolution Method</th><th>Description</th></tr>
<tr><td>Chaining (Closed Addressing)</td><td>Overflow records in linked list at same bucket</td></tr>
<tr><td>Open Addressing</td><td>Probe for next free slot (linear, quadratic, double hashing)</td></tr>
<tr><td>Overflow Bucket</td><td>Extra bucket chained to primary bucket</td></tr></table>`,

'explain-plan':`<h2>EXPLAIN / Query Execution Plan</h2>
<div class="code-block"><span class="sql-kw">EXPLAIN FORMAT</span>=JSON <span class="sql-kw">SELECT</span> s.name, <span class="sql-fn">COUNT</span>(*) <span class="sql-kw">AS</span> courses
<span class="sql-kw">FROM</span> Students s <span class="sql-kw">JOIN</span> Enrollment e <span class="sql-kw">ON</span> s.student_id = e.student_id
<span class="sql-kw">GROUP BY</span> s.student_id;

<span class="sql-cmt">-- Key EXPLAIN columns to understand:</span>
<span class="sql-cmt">-- type: ALL(full scan), index, range, ref, eq_ref, const (best→worst: const, eq_ref, ref, range, index, ALL)</span>
<span class="sql-cmt">-- key: which index is being used</span>
<span class="sql-cmt">-- rows: estimated rows scanned</span>
<span class="sql-cmt">-- Extra: Using filesort (bad!), Using index (good!), Using temporary (bad!)</span>

<span class="sql-cmt">-- Example: add index to fix slow query</span>
<span class="sql-kw">CREATE INDEX</span> idx_dept <span class="sql-kw">ON</span> Employees(dept);  <span class="sql-cmt">-- changes type from ALL to ref</span></div>`
};

let currentStep=1,completedSteps=JSON.parse(localStorage.getItem('dbms_completedSteps')||'[]');
function updateProgress(){const p=(completedSteps.length/6)*100;document.getElementById('progressFill').style.width=p+'%';document.getElementById('progressPercent').textContent=Math.round(p)+'%';document.querySelectorAll('.step-btn').forEach(b=>b.classList.toggle('completed',completedSteps.includes(parseInt(b.dataset.step))));}
function markStepComplete(step){if(!completedSteps.includes(step)){completedSteps.push(step);localStorage.setItem('dbms_completedSteps',JSON.stringify(completedSteps));updateProgress();renderStepContent(step);}}
function renderStepContent(step){currentStep=step;const sd=stepsData[step];const isC=completedSteps.includes(step);let html=`<div class="step-content active"><div class="step-header"><div><h2>${sd.title}</h2><p>${sd.description}</p></div>${!isC?`<button class="complete-step-btn" onclick="markStepComplete(${step})">✓ Mark as Complete</button>`:'<div class="completed-badge">✓ Step Completed! 🎉</div>'}</div>`;sd.topics.forEach(t=>{html+=`<div class="topic-card" onclick="toggleSubTopics(this)"><div class="topic-header"><h3><span class="topic-icon">${t.icon}</span> ${t.title}</h3><span class="arrow">›</span></div><div class="sub-topics">`;t.subs.forEach(s=>{html+=`<div class="sub-topic" onclick="showContent(event,'${s.id}')">${s.title}</div>`;});html+=`</div></div>`;});html+=`<div class="detail-container" id="detailContainer"><p style="color:#94a3b8;text-align:center;">🗄️ Click any topic to view detailed explanations with SQL code examples.</p></div><div class="nav-buttons">${step>1?`<button class="nav-btn prev" onclick="changeStep(${step-1})">← Previous</button>`:'<div></div>'}${step<6?`<button class="nav-btn next" onclick="changeStep(${step+1})">Next →</button>`:`<button class="nav-btn next" onclick="window.location.href='subjects.html'">🏆 Complete DBMS →</button>`}</div></div>`;document.getElementById('contentSection').innerHTML=html;document.querySelectorAll('.step-btn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.step)===step));}
function changeStep(s){if(s>=1&&s<=6){renderStepContent(s);window.scrollTo({top:0,behavior:'smooth'});}}
function toggleSubTopics(card){const sub=card.querySelector('.sub-topics');const arrow=card.querySelector('.arrow');document.querySelectorAll('.sub-topics').forEach(s=>{if(s!==sub)s.classList.remove('active');});sub.classList.toggle('active');if(arrow)arrow.style.transform=sub.classList.contains('active')?'rotate(90deg)':'rotate(0deg)';}
function showContent(e,id){e.stopPropagation();const dc=document.getElementById('detailContainer');dc.innerHTML=detailedContent[id]||'<p>Content coming soon!</p>';dc.scrollIntoView({behavior:'smooth',block:'start'});}
document.querySelectorAll('.step-btn').forEach(b=>b.addEventListener('click',()=>changeStep(parseInt(b.dataset.step))));
updateProgress();renderStepContent(1);
</script>
</body>
</html>

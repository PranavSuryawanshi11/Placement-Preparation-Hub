        // Step 1: OS Introduction & Processes
        'os-intro': `<h2>What is an Operating System?</h2><p>An Operating System (OS) is system software that acts as an intermediary between the user and computer hardware. It manages hardware resources and provides services for application software.</p><div class="example-box"><strong>Examples:</strong> Windows, Linux, macOS, Android, iOS</div><div class="tip-box">💡 The OS is the most important software that runs on a computer, managing all other programs.</div>`,

        'os-types': `<h2>Types of Operating Systems</h2><ul><li><strong>Batch OS:</strong> Jobs processed in batches</li><li><strong>Time-Sharing OS:</strong> Multiple users share CPU time</li><li><strong>Real-Time OS:</strong> Guaranteed response times</li><li><strong>Distributed OS:</strong> Multiple computers work together</li><li><strong>Network OS:</strong> Manages network resources</li><li><strong>Mobile OS:</strong> Android, iOS for mobile devices</li></ul>`,

        'process-thread-diff': `<h2>Process vs Thread Comparison</h2> <table> <tr><th>Process</th><th>Thread</th></tr> <tr><td>Heavyweight</td><td>Lightweight</td></tr> <tr><td>Separate memory space</td><td>Shared memory space</td></tr> <tr><td>More overhead</td><td>Less overhead</td></tr> <tr><td>Slower context switch</td><td>Faster context switch</td></tr> <tr><td>Independent</td><td>Threads of same process dependent</td></tr> </table>`,

        'scheduling-criteria': `<h2>Scheduling Criteria</h2><ul><li><strong>CPU Utilization:</strong> Keep CPU as busy as possible</li><li><strong>Throughput:</strong> Number of processes completed per time unit</li><li><strong>Turnaround Time:</strong> Total time from submission to completion</li><li><strong>Waiting Time:</strong> Total time spent in ready queue</li><li><strong>Response Time:</strong> Time from submission to first response</li></ul>`,
        
        'scheduling-queues': `<h2>Scheduling Queues</h2><ul><li><strong>Job Queue:</strong> All processes in system</li><li><strong>Ready Queue:</strong> Processes ready to execute</li><li><strong>Device Queue:</strong> Processes waiting for I/O</li></ul>`,
        
        'fcfs': `<h2>FCFS (First Come First Serve)</h2><p>The simplest scheduling algorithm. Processes are executed in the order they arrive.</p><div class="code-block"><span class="comment">// Example: Processes arriving order: P1, P2, P3</span><br>Gantt Chart: | P1 | P2 | P3 |<br>FCFS is non-preemptive and can cause convoy effect.</div><div class="note-box">⚠️ Disadvantage: Average waiting time can be high (convoy effect).</div>`,
        
        'sjf': `<h2>SJF (Shortest Job First)</h2><p>Process with smallest burst time executes first. Can be preemptive (SRTF) or non-preemptive.</p><div class="tip-box">✅ SJF is optimal in terms of average waiting time.</div>`,
        
        'priority': `<h2>Priority Scheduling</h2><p>Each process has a priority. Higher priority processes execute first.</p><div class="warning-box">⚠️ Problem: Starvation (lower priority processes may never execute). Solution: Aging (increase priority over time).</div>`,
        
        'round-robin': `<h2>Round Robin Scheduling</h2><p>Each process gets a fixed time quantum (time slice). Preemptive and fair algorithm.</p><div class="code-block"><span class="comment">// Time Quantum = 4 units</span><br>Processes: P1(5), P2(4), P3(7)<br>Gantt: P1(4) P2(4) P3(4) P1(1) P3(3)</div><div class="tip-box">💡 Small quantum → more context switches, large quantum → FCFS behavior.</div>`,
        
        'multilevel-queue': `<h2>Multilevel Queue & Feedback</h2><p>Processes are divided into multiple queues with different priorities. Feedback allows processes to move between queues.</p><div class="example-box">System processes (highest) → Interactive processes → Batch processes (lowest)</div>`,
        
        // Step 3: Process Synchronization
        'race-condition': `<h2>Race Condition & Critical Section</h2><p>A race condition occurs when multiple processes access shared data concurrently, leading to inconsistent results.</p><div class="code-block"><span class="comment">// Critical Section: Code segment that accesses shared variables</span><br><span class="keyword">do</span> {<br>  <span class="comment">// Entry section</span><br>  <span class="comment">// Critical section</span><br>  <span class="comment">// Exit section</span><br>  <span class="comment">// Remainder section</span><br>} <span class="keyword">while</span>(true);</div>`,
        
        'synchronization-requirements': `<h2>Synchronization Requirements</h2><ul><li><strong>Mutual Exclusion:</strong> Only one process in critical section at a time</li><li><strong>Progress:</strong> If no process in CS, one must be able to enter</li><li><strong>Bounded Waiting:</strong> Limit on waiting time</li><li><strong>Portability:</strong> No assumptions about CPU speeds</li></ul>`,
        
        'mutex': `<h2>Mutex Locks</h2><p>A mutex (mutual exclusion) lock provides a simple locking mechanism.</p><div class="code-block"><span class="keyword">acquire()</span> {<br>  <span class="keyword">while</span> (!available) <span class="comment">// busy wait</span><br>  available = false;<br>}<br><br><span class="keyword">release()</span> {<br>  available = true;<br>}</div>`,
        
        'semaphores': `<h2>Semaphores</h2><p>Semaphores are synchronization tools with wait() and signal() operations.</p><div class="code-block"><span class="comment">// Binary semaphore (mutex)</span><br><span class="comment">// Counting semaphore (multiple resources)</span><br><br>wait(S) {<br>  <span class="keyword">while</span> (S <= 0);<br>  S--;<br>}<br><br>signal(S) {<br>  S++;<br>}</div>`,
        
        'classical-problems': `<h2>Classical Synchronization Problems</h2><p>Three classic problems test synchronization concepts: Bounded Buffer, Readers-Writers, and Dining Philosophers.</p>`,
        
        'producer-consumer': `<h2>Producer-Consumer Problem</h2><p>Producer produces items into buffer, consumer consumes items. Requires synchronization to avoid buffer overflow/underflow.</p><div class="code-block"><span class="keyword">// Using semaphores</span><br>semaphore mutex = 1, empty = n, full = 0;<br><br><span class="comment">// Producer</span><br>wait(empty); wait(mutex); <span class="comment">// produce</span> signal(mutex); signal(full);<br><br><span class="comment">// Consumer</span><br>wait(full); wait(mutex); <span class="comment">// consume</span> signal(mutex); signal(empty);</div>`,
        
        'readers-writers': `<h2>Readers-Writers Problem</h2><p>Multiple readers can read simultaneously, but writers need exclusive access. Ensures data consistency.</p>`,
        
        'dining-philosophers': `<h2>Dining Philosophers Problem</h2><p>Five philosophers sit at a round table with chopsticks between them. They need two chopsticks to eat. Classic deadlock example.</p>`,
        
        // Step 4: Deadlocks
        'deadlock-conditions': `<h2>Necessary Conditions for Deadlock</h2><ul><li><strong>Mutual Exclusion:</strong> At least one resource held in non-sharable mode</li><li><strong>Hold and Wait:</strong> Process holds resources while waiting for others</li><li><strong>No Preemption:</strong> Resources cannot be forcibly taken</li><li><strong>Circular Wait:</strong> Cycle of processes waiting for each other</li></ul>`,
        
        'resource-allocation': `<h2>Resource Allocation Graph</h2><p>Graph showing processes (circles), resources (squares), assignment edges (resource → process), and request edges (process → resource). Cycle indicates potential deadlock.</p>`,
        
        'deadlock-prevention': `<h2>Deadlock Prevention</h2><p>Prevent any of the four necessary conditions:</p><ul><li>Break mutual exclusion (not always possible)</li><li>Break hold and wait (request all resources at once)</li><li>Break no preemption (preempt resources)</li><li>Break circular wait (impose total ordering of resources)</li></ul>`,
        
        'deadlock-avoidance': `<h2>Deadlock Avoidance (Banker's Algorithm)</h2><p>Banker's Algorithm checks if resource allocation leads to safe state.</p><div class="code-block"><span class="comment">// Safe sequence exists if resources can be allocated without deadlock</span><br>Available, Max, Allocation, Need matrices<br>Request algorithm checks if request can be granted safely.</div>`,
        
        'deadlock-detection': `<h2>Deadlock Detection</h2><p>Regularly check for deadlocks using detection algorithms. Single instance: wait-for graph. Multiple instances: detection algorithm similar to Banker's.</p>`,
        
        'deadlock-recovery': `<h2>Deadlock Recovery</h2><ul><li><strong>Process Termination:</strong> Abort one or more processes</li><li><strong>Resource Preemption:</strong> Take resources from processes</li><li><strong>Checkpoint/Restart:</strong> Rollback to safe state</li></ul>`,
        
        // Step 5: Memory Management
        'memory-hierarchy': `<h2>Memory Hierarchy</h2><p>Registers → Cache → Main Memory → Secondary Storage (faster to slower, expensive to cheaper).</p>`,
        
        'logical-physical': `<h2>Logical vs Physical Address Space</h2><p><strong>Logical Address:</strong> Generated by CPU, virtual address.<br><strong>Physical Address:</strong> Actual location in memory.<br><strong>MMU (Memory Management Unit):</strong> Maps logical to physical addresses.</p>`,
        
        'swapping': `<h2>Swapping</h2><p>Moving processes between main memory and secondary storage to increase multiprogramming.</p>`,
        
        'contiguous-allocation': `<h2>Contiguous Memory Allocation</h2><p>Each process gets a single contiguous block of memory. Fixed partitioning or dynamic partitioning.</p>`,
        
        'fragmentation': `<h2>Fragmentation</h2><ul><li><strong>Internal Fragmentation:</strong> Wasted space within allocated block</li><li><strong>External Fragmentation:</strong> Small holes between allocations</li></ul><div class="tip-box">💡 Compaction can reduce external fragmentation by moving processes.</div>`,
        
        'paging': `<h2>Paging</h2><p>Divides physical memory into fixed-size frames and logical memory into pages. Eliminates external fragmentation.</p><div class="code-block">Page Table: Maps page number to frame number<br>Logical Address: Page Number + Page Offset<br>Physical Address: Frame Number + Page Offset</div>`,
        
        'segmentation': `<h2>Segmentation</h2><p>Divides program into variable-sized segments (code, data, stack). Segment table maps segment to physical location.</p>`,
        
        'virtual-memory-concept': `<h2>Virtual Memory Concept</h2><p>Separates logical memory from physical memory, allowing processes to run with incomplete loading.</p><div class="example-box"><strong>Benefits:</strong><br>• Efficient memory usage<br>• Larger address space<br>• Process protection<br>• Easier programming</div>`,
        
        'page-replacement': `<h2>Page Replacement Algorithms</h2><ul><li><strong>FIFO:</strong> Replace oldest page (Belady's anomaly possible)</li><li><strong>Optimal:</strong> Replace page not used for longest time (theoretical)</li><li><strong>LRU (Least Recently Used):</strong> Replace least recently used page</li><li><strong>Clock/Second Chance:</strong> Circular queue with reference bits</li></ul>`,
        
        'thrashing': `<h2>Thrashing</h2><p>Excessive paging due to insufficient memory. Processes constantly page fault, CPU utilization drops.</p><div class="warning-box">⚠️ Solution: Working set model, page fault frequency control, increase memory.</div>`,
        
        // Step 6: File Systems & I/O
        'file-concept': `<h2>File Concepts & Attributes</h2><p>A file is a named collection of related information stored on secondary storage.</p><ul><li><strong>Attributes:</strong> Name, identifier, type, location, size, protection, time stamps</li><li><strong>Operations:</strong> Create, read, write, delete, truncate, append</li></ul>`,
        
        'file-access': `<h2>File Access Methods</h2><ul><li><strong>Sequential Access:</strong> Read in order from beginning</li><li><strong>Direct Access:</strong> Random access by block number</li><li><strong>Indexed Access:</strong> Index blocks for random access</li></ul>`,
        
        'directory-structure': `<h2>Directory Structure</h2><ul><li><strong>Single-Level:</strong> One directory for all files</li><li><strong>Two-Level:</strong> Separate directories per user</li><li><strong>Tree-Structured:</strong> Hierarchical directories</li><li><strong>Acyclic Graph:</strong> Allows shared subdirectories</li></ul>`,
        
        'file-allocation': `<h2>File Allocation Methods</h2><ul><li><strong>Contiguous:</strong> Fast access, external fragmentation</li><li><strong>Linked:</strong> No fragmentation, slow random access</li><li><strong>Indexed:</strong> Fast random access, index overhead</li></ul>`,
        
        'disk-structure': `<h2>Disk Structure</h2><p>Disks consist of platters, tracks, sectors, and cylinders. Performance depends on seek time, rotational latency, and transfer time.</p>`,
        
        'disk-scheduling': `<h2>Disk Scheduling Algorithms</h2><ul><li><strong>FCFS:</strong> First come first served</li><li><strong>SSTF:</strong> Shortest seek time first</li><li><strong>SCAN/Elevator:</strong> Sweeps across disk</li><li><strong>C-SCAN:</strong> Circular SCAN</li><li><strong>LOOK/C-LOOK:</strong> SCAN with limited movement</li></ul>`,
        
        'disk-management': `<h2>Disk Management</h2><ul><li><strong>Low-Level Formatting:</strong> Dividing disk into sectors</li><li><strong>Partitioning:</strong> Dividing disk into logical drives</li><li><strong>Logical Formatting:</strong> Creating file system</li><li><strong>Boot Block:</strong> Stored in boot sector for system startup</li></ul>`,
        
        'io-hardware': `<h2>I/O Hardware</h2><p>I/O devices include keyboards, mice, monitors, printers, disks. Ports, buses, controllers manage communication.</p>`,
        
        'io-techniques': `<h2>I/O Techniques</h2><ul><li><strong>Polling:</strong> CPU constantly checks device status (busy waiting)</li><li><strong>Interrupt-Driven I/O:</strong> Device interrupts CPU when ready</li><li><strong>DMA (Direct Memory Access):</strong> Transfers data directly to memory without CPU involvement</li></ul>`
    };

    let currentStep = 1;
    let completedSteps = JSON.parse(localStorage.getItem('osCompletedSteps') || '[]');

    function updateProgress() {
        const percent = (completedSteps.length / 6) * 100;
        document.getElementById('progressFill').style.width = `${percent}%`;
        document.getElementById('progressPercent').textContent = `${Math.round(percent)}%`;
        
        document.querySelectorAll('.step-btn').forEach(btn => {
            const step = parseInt(btn.dataset.step);
            if (completedSteps.includes(step)) {
                btn.classList.add('completed');
            } else {
                btn.classList.remove('completed');
            }
        });
    }

    function markStepComplete(step) {
        if (!completedSteps.includes(step)) {
            completedSteps.push(step);
            localStorage.setItem('osCompletedSteps', JSON.stringify(completedSteps));
            updateProgress();
            renderStepContent(step);
        }
    }

    function renderStepContent(step) {
        currentStep = step;
        const stepData = stepsData[step];
        const isCompleted = completedSteps.includes(step);
        
        let html = `
            <div class="step-content active">
                <div class="step-header">
                    <div>
                        <h2>${stepData.title}</h2>
                        <p>${stepData.description}</p>
                    </div>
                    ${!isCompleted ? `<button class="complete-step-btn" onclick="markStepComplete(${step})">✓ Mark as Complete</button>` : '<div class="completed-badge">✓ Step Completed! 🎉</div>'}
                </div>
        `;
        
        stepData.topics.forEach(topic => {
            html += `
                <div class="topic-card" onclick="toggleSubTopics(this)">
                    <div class="topic-header">
                        <h3><span class="topic-icon">${topic.icon}</span> ${topic.title}</h3>
                        <span class="arrow">›</span>
                    </div>
                    <div class="sub-topics">
            `;
            
            topic.subs.forEach(sub => {
                html += `<div class="sub-topic" onclick="showContent(event, '${sub.id}')">${sub.title}</div>`;
            });
            
            html += `</div></div>`;
        });
        
        html += `
            <div class="detail-container" id="detailContainer">
                <p style="color:#94a3b8; text-align:center;">📚 Click on any topic above to view detailed content with examples, code snippets, and comprehensive explanations.</p>
            </div>
            <div class="nav-buttons">
                ${step > 1 ? `<button class="nav-btn prev" onclick="changeStep(${step - 1})">← Previous Step</button>` : '<div></div>'}
                ${step < 6 ? `<button class="nav-btn next" onclick="changeStep(${step + 1})">Next Step →</button>` : '<button class="nav-btn next" onclick="window.location.href=\'subjects.html\'">🏆 Complete OS Course →</button>'}
            </div>
        </div>`;
        
        document.getElementById('contentSection').innerHTML = html;
        
        document.querySelectorAll('.step-btn').forEach(btn => {
            btn.classList.remove('active');
            if (parseInt(btn.dataset.step) === step) {
                btn.classList.add('active');
            }
        });
    }
    
    function changeStep(step) {
        if (step >= 1 && step <= 6) {
            renderStepContent(step);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }
    
    function toggleSubTopics(card) {
        const subTopics = card.querySelector('.sub-topics');
        const arrow = card.querySelector('.arrow');
        const allSubs = document.querySelectorAll('.sub-topics');
        
        allSubs.forEach(sub => {
            if (sub !== subTopics) sub.classList.remove('active');
        });
        
        subTopics.classList.toggle('active');
        if (arrow) {
            arrow.style.transform = subTopics.classList.contains('active') ? 'rotate(90deg)' : 'rotate(0deg)';
        }
    }
    
    function showContent(event, id) {
        event.stopPropagation();
        const detailContainer = document.getElementById('detailContainer');
        const content = detailedContent[id] || `<p>📖 Content for this topic is being enhanced. Check back soon for detailed explanations with examples!</p>`;
        detailContainer.innerHTML = content;
        detailContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
    
    updateProgress();
    renderStepContent(1);
</script>

</body>
</html>

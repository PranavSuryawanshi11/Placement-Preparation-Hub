const detailedContent={
'network-intro':`<h2>What is a Network?</h2>
<p>A computer network is a collection of interconnected devices (nodes) that share resources and communicate with each other.</p>
<table><tr><th>Type</th><th>Coverage</th><th>Example</th><th>Speed</th></tr>
<tr><td>PAN (Personal)</td><td>~10 meters</td><td>Bluetooth devices</td><td>1-3 Mbps</td></tr>
<tr><td>LAN (Local)</td><td>Building/Campus</td><td>Office network, Wi-Fi</td><td>1 Gbps+</td></tr>
<tr><td>MAN (Metropolitan)</td><td>City</td><td>Cable TV, WiMAX</td><td>10-100 Mbps</td></tr>
<tr><td>WAN (Wide)</td><td>Country/World</td><td>Internet, MPLS</td><td>Variable</td></tr>
<tr><td>CAN (Campus)</td><td>University campus</td><td>University network</td><td>1-10 Gbps</td></tr></table>`,

'network-topologies':`<h2>Network Topologies</h2>
<table><tr><th>Topology</th><th>Structure</th><th>Pros</th><th>Cons</th></tr>
<tr><td>Bus</td><td>All on single cable</td><td>Simple, cheap</td><td>Single point of failure, collisions</td></tr>
<tr><td>Star</td><td>All connect to central hub/switch</td><td>Easy to manage, fault isolation</td><td>Hub/switch failure kills network</td></tr>
<tr><td>Ring</td><td>Each node connects to exactly 2</td><td>Equal access, no collisions</td><td>Single failure breaks ring</td></tr>
<tr><td>Mesh</td><td>Every node connects to every other</td><td>Highly fault tolerant</td><td>Expensive, complex</td></tr>
<tr><td>Tree</td><td>Hierarchical star</td><td>Scalable, easy to extend</td><td>Root failure kills all</td></tr>
<tr><td>Hybrid</td><td>Mix of topologies</td><td>Flexible</td><td>Complex design</td></tr></table>
<div class="tip-box">💡 Modern LANs use <strong>Star topology</strong> with Ethernet switches. The Internet itself uses a <strong>Mesh topology</strong> at its core.</div>`,

'transmission-modes':`<h2>Transmission Modes</h2>
<table><tr><th>Mode</th><th>Direction</th><th>Simultaneous?</th><th>Example</th></tr>
<tr><td>Simplex</td><td>One way only</td><td>No</td><td>Keyboard → Computer, TV broadcast</td></tr>
<tr><td>Half-Duplex</td><td>Both ways, one at a time</td><td>No</td><td>Walkie-talkie, old Ethernet (CSMA/CD)</td></tr>
<tr><td>Full-Duplex</td><td>Both ways simultaneously</td><td>Yes</td><td>Telephone, modern Ethernet switch</td></tr></table>`,

'network-devices':`<h2>Network Devices</h2>
<table><tr><th>Device</th><th>OSI Layer</th><th>Function</th><th>Intelligence</th></tr>
<tr><td>Hub</td><td>Layer 1 (Physical)</td><td>Broadcasts to ALL ports</td><td>None — dumb repeater</td></tr>
<tr><td>Switch</td><td>Layer 2 (Data Link)</td><td>Forwards based on MAC address table</td><td>Learns MAC-to-port mapping</td></tr>
<tr><td>Router</td><td>Layer 3 (Network)</td><td>Routes packets between networks using IP</td><td>Routing table, protocols</td></tr>
<tr><td>Bridge</td><td>Layer 2</td><td>Connects two LAN segments, filters by MAC</td><td>Simple MAC learning</td></tr>
<tr><td>Gateway</td><td>Layer 4-7</td><td>Protocol translation between different networks</td><td>Protocol-specific logic</td></tr>
<tr><td>Repeater</td><td>Layer 1</td><td>Amplifies and regenerates signal</td><td>None</td></tr>
<tr><td>Modem</td><td>Layer 1</td><td>Modulates/demodulates analog-digital</td><td>None</td></tr></table>`,

'osi-model':`<h2>OSI 7-Layer Model</h2>
<p><strong>Mnemonic:</strong> "Please Do Not Throw Sausage Pizza Away" (Physical, Data Link, Network, Transport, Session, Presentation, Application)</p>
<table><tr><th>Layer</th><th>Name</th><th>PDU</th><th>Key Protocols</th><th>Devices</th></tr>
<tr><td>7</td><td>Application</td><td>Data/Message</td><td>HTTP, FTP, SMTP, DNS, SSH</td><td>—</td></tr>
<tr><td>6</td><td>Presentation</td><td>Data</td><td>SSL/TLS, JPEG, ASCII, MPEG</td><td>—</td></tr>
<tr><td>5</td><td>Session</td><td>Data</td><td>NetBIOS, RPC, PPTP</td><td>—</td></tr>
<tr><td>4</td><td>Transport</td><td>Segment</td><td>TCP, UDP, SCTP</td><td>—</td></tr>
<tr><td>3</td><td>Network</td><td>Packet</td><td>IP, ICMP, OSPF, BGP</td><td>Router, L3 Switch</td></tr>
<tr><td>2</td><td>Data Link</td><td>Frame</td><td>Ethernet, Wi-Fi (802.11), PPP, ARP</td><td>Switch, Bridge</td></tr>
<tr><td>1</td><td>Physical</td><td>Bits</td><td>Ethernet cable, USB, Bluetooth</td><td>Hub, Repeater, Modem</td></tr></table>
<div class="tip-box">💡 Data encapsulation: Each layer adds its own header (and sometimes trailer) as data passes DOWN. Decapsulation removes headers as data passes UP at the receiver.</div>`,

'osi-layers-detail':`<h2>Each OSI Layer — Deep Dive</h2>
<h3>Layer 1 — Physical</h3>
<p>Transmits raw bits over a physical medium. Defines voltage levels, timing, pin layout, cable specifications.</p>
<h3>Layer 2 — Data Link</h3>
<p>Node-to-node delivery. Handles framing, MAC addressing, error detection (CRC), flow control. Split into LLC and MAC sublayers.</p>
<h3>Layer 3 — Network</h3>
<p>Source-to-destination delivery across multiple networks. Logical (IP) addressing, routing, fragmentation.</p>
<h3>Layer 4 — Transport</h3>
<p>End-to-end communication. Multiplexing via ports, segmentation, reassembly, reliability (TCP) or speed (UDP).</p>
<h3>Layer 5 — Session</h3>
<p>Manages sessions (connections) between applications. Dialog control (who sends when), synchronization (checkpoints for long transfers).</p>
<h3>Layer 6 — Presentation</h3>
<p>Data translation: encryption/decryption, compression, encoding (ASCII ↔ EBCDIC, Unicode). "Translator" of OSI model.</p>
<h3>Layer 7 — Application</h3>
<p>Interface for user applications. Provides network services to apps — HTTP for web, SMTP for email, DNS for name resolution.</p>`,

'osi-vs-tcpip':`<h2>OSI vs TCP/IP Model</h2>
<table><tr><th>OSI Model (7 Layers)</th><th>TCP/IP Model (4/5 Layers)</th></tr>
<tr><td>Application (7)</td><td rowspan="3">Application</td></tr>
<tr><td>Presentation (6)</td></tr>
<tr><td>Session (5)</td></tr>
<tr><td>Transport (4)</td><td>Transport</td></tr>
<tr><td>Network (3)</td><td>Internet</td></tr>
<tr><td>Data Link (2)</td><td rowspan="2">Network Access / Link</td></tr>
<tr><td>Physical (1)</td></tr></table>
<div class="note-box">📌 OSI is a <strong>theoretical reference model</strong> (conceptual). TCP/IP is the <strong>practical implementation</strong> model actually used on the Internet. In interviews, use OSI for explaining concepts, TCP/IP for practical discussions.</div>`,

'signals':`<h2>Analog vs Digital Signals</h2>
<table><tr><th></th><th>Analog Signal</th><th>Digital Signal</th></tr>
<tr><td>Values</td><td>Continuous range</td><td>Discrete (0 or 1)</td></tr>
<tr><td>Noise immunity</td><td>Low — noise accumulates</td><td>High — can regenerate perfectly</td></tr>
<tr><td>Bandwidth</td><td>Continuous</td><td>Discrete bits per second (bps)</td></tr>
<tr><td>Examples</td><td>Sound waves, AM/FM radio</td><td>Ethernet, USB, digital audio</td></tr></table>
<h3>Key Terms</h3>
<table><tr><th>Term</th><th>Definition</th></tr>
<tr><td>Bandwidth</td><td>Range of frequencies a channel can carry (Hz) OR data rate (bps)</td></tr>
<tr><td>Attenuation</td><td>Loss of signal strength over distance</td></tr>
<tr><td>Noise</td><td>Unwanted signal that distorts data</td></tr>
<tr><td>SNR (Signal-to-Noise Ratio)</td><td>Signal power / Noise power — higher is better</td></tr>
<tr><td>Nyquist Rate</td><td>Max data rate = 2B log₂V (B=bandwidth, V=signal levels, noiseless)</td></tr>
<tr><td>Shannon Capacity</td><td>Max data rate = B log₂(1 + SNR) (noisy channel)</td></tr></table>`,

'error-detection':`<h2>Error Detection Methods</h2>
<h3>1. Parity Check</h3>
<div class="code-block">Even parity: count of 1s must be even
Data: 1011001  → 1s count = 4 (even) → parity bit = 0
Data: 1010001  → 1s count = 3 (odd)  → parity bit = 1
Limitation: can only detect ODD number of bit errors</div>
<h3>2. Checksum (used in TCP/IP)</h3>
<div class="code-block">Sender: Divide data into 16-bit words
         Sum all words (1's complement arithmetic)
         Complement the sum → checksum
         Append checksum to data
Receiver: Sum all words INCLUDING checksum
          If result = all 1s → no error
          Else → error detected</div>
<h3>3. CRC — Cyclic Redundancy Check (most powerful)</h3>
<div class="code-block">CRC-32 used in Ethernet, ZIP files
Generator polynomial: G(x) (agreed upon)
Sender: M(x) × x^r ÷ G(x) → remainder = CRC
Transmit: M(x) + CRC
Receiver: Divide received bits by G(x) → remainder = 0 means no error
Can detect: all single-bit errors, all burst errors < degree of G(x)</div>`,

'error-correction':`<h2>Error Correction — Hamming Code</h2>
<p>Hamming code adds redundancy bits to detect AND correct single-bit errors.</p>
<div class="code-block">For m data bits, need r parity bits where: 2^r ≥ m + r + 1

Example: 4 data bits (D1D2D3D4) → r = 3 parity bits (P1 P2 P3)
Positions: 1  2  3  4  5  6  7
           P1 P2 D1 P3 D2 D3 D4

P1 covers positions: 1,3,5,7 (all with bit 1 in position number)
P2 covers positions: 2,3,6,7 (all with bit 2 in position number)
P3 covers positions: 4,5,6,7 (all with bit 3 in position number)

If P1 P2 P3 = 0 0 0 → no error
If P1 P2 P3 = 0 1 1 → error at position 3 (011 binary = 3)</div>
<div class="tip-box">💡 Hamming distance = number of bit positions in which two codewords differ. Hamming code with minimum distance 3 can detect 2-bit errors and correct 1-bit errors.</div>`,

'flow-control':`<h2>Flow Control — Stop-and-Wait & Sliding Window</h2>
<table><tr><th>Protocol</th><th>Sender Window</th><th>Receiver Window</th><th>Efficiency</th></tr>
<tr><td>Stop-and-Wait</td><td>1</td><td>1</td><td>1/(1+2a) where a=Tp/Tt</td></tr>
<tr><td>Go-Back-N</td><td>Up to 2^n-1</td><td>1</td><td>W/(1+2a) if W≤1+2a, else 1</td></tr>
<tr><td>Selective Repeat</td><td>Up to 2^(n-1)</td><td>Up to 2^(n-1)</td><td>W/(1+2a) if W≤1+2a, else 1</td></tr></table>
<div class="code-block">Efficiency formula:
η = 1 / (1 + 2a)  for Stop-and-Wait
η = W / (1 + 2a)  for Sliding Window (if W ≤ 1+2a)
η = 1             for Sliding Window (if W > 1+2a)

where: a = Propagation Delay / Transmission Time = Tp/Tt
       W = window size</div>`,

'mac-protocols':`<h2>MAC Protocols — ALOHA, CSMA/CD, CSMA/CA</h2>
<h3>ALOHA Protocols</h3>
<table><tr><th>Protocol</th><th>When to Send</th><th>Max Efficiency</th></tr>
<tr><td>Pure ALOHA</td><td>Anytime</td><td>18.4% (1/2e)</td></tr>
<tr><td>Slotted ALOHA</td><td>Only at start of time slots</td><td>36.8% (1/e)</td></tr></table>
<h3>CSMA — Carrier Sense Multiple Access</h3>
<table><tr><th>Variant</th><th>Full Name</th><th>Environment</th></tr>
<tr><td>CSMA/CD</td><td>CSMA with Collision Detection</td><td>Wired Ethernet (detect during transmission)</td></tr>
<tr><td>CSMA/CA</td><td>CSMA with Collision Avoidance</td><td>Wireless (Wi-Fi — can't detect while transmitting)</td></tr></table>
<div class="example-box"><strong>CSMA/CD (Ethernet) Process:</strong><br>
1. Listen before transmit (carrier sense)<br>
2. If busy → wait. If idle → transmit<br>
3. While transmitting → monitor for collision<br>
4. If collision detected → send JAM signal, stop<br>
5. Wait random backoff time (Binary Exponential Backoff)<br>
6. Retry up to 16 times, then give up</div>`,

'ethernet':`<h2>Ethernet — IEEE 802.3</h2>
<h3>Ethernet Frame Format (802.3)</h3>
<table><tr><th>Field</th><th>Size</th><th>Purpose</th></tr>
<tr><td>Preamble</td><td>7 bytes</td><td>Synchronization (10101010...)</td></tr>
<tr><td>SFD (Start Frame Delimiter)</td><td>1 byte</td><td>10101011 — marks start of frame</td></tr>
<tr><td>Destination MAC</td><td>6 bytes</td><td>Recipient's MAC address</td></tr>
<tr><td>Source MAC</td><td>6 bytes</td><td>Sender's MAC address</td></tr>
<tr><td>EtherType / Length</td><td>2 bytes</td><td>Protocol type (0x0800=IPv4, 0x0806=ARP) or length</td></tr>
<tr><td>Data / Payload</td><td>46-1500 bytes</td><td>Actual data (padded if < 46 bytes)</td></tr>
<tr><td>FCS (CRC-32)</td><td>4 bytes</td><td>Error detection</td></tr></table>
<div class="tip-box">💡 Minimum frame size = 64 bytes (prevents a node from sending and finishing before collision is detected). This is why the minimum payload is 46 bytes (64 - 18 bytes overhead).</div>`,

'mac-address':`<h2>MAC Address — ARP & RARP</h2>
<p>MAC (Media Access Control) address is a 48-bit (6-byte) hardware address burned into the NIC.</p>
<div class="code-block">Format: XX:XX:XX:XX:XX:XX (hexadecimal)
Example: 00:1A:2B:3C:4D:5E

First 3 bytes: OUI (Organizationally Unique Identifier) — identifies manufacturer
Last 3 bytes:  NIC-specific unique value

Special MACs:
FF:FF:FF:FF:FF:FF = Broadcast (sent to all)
01:xx:xx:xx:xx:xx = Multicast (bit 1 of first byte = 1)</div>
<h3>ARP — Address Resolution Protocol</h3>
<div class="code-block">Problem: Know IP address but need MAC address for local delivery
ARP Request:  Broadcast → "Who has IP 192.168.1.5? Tell 192.168.1.1"
ARP Reply:    Unicast → "192.168.1.5 is at MAC 00:1A:2B:3C:4D:5E"
ARP Cache:    Stores IP→MAC mappings (timeout ~20 min)

Gratuitous ARP: Device announces its own IP→MAC mapping
Used for: IP conflict detection, update caches after MAC change</div>`,

'go-back-n':`<h2>Go-Back-N ARQ</h2>
<p>Sender can send up to W frames without acknowledgment. On error or timeout, retransmits ALL frames from the errored one.</p>
<div class="code-block">Window size W ≤ 2^n - 1  (where n = sequence number bits)
Example: n=3 bits → sequence numbers 0-7 → W ≤ 7

Frame 0  → ACK 0 received
Frame 1  → ACK 1 received  
Frame 2  → ERROR (NAK or timeout)
Frame 3  → discard (even if correct)
Frame 4  → discard
→ Retransmit: Frame 2, 3, 4, 5...  (go back to 2)</div>
<div class="note-box">⚠️ Wasteful — correct frames after error are discarded and retransmitted. But simpler receiver (only needs to buffer 1 frame).</div>`,

'selective-repeat':`<h2>Selective Repeat ARQ</h2>
<p>Only the specific errored frame is retransmitted. Receiver buffers out-of-order frames.</p>
<div class="code-block">Window size W ≤ 2^(n-1)  (where n = sequence number bits)
Example: n=3 bits → sequence numbers 0-7 → W ≤ 4

Frame 0  → buffered ✅
Frame 1  → buffered ✅
Frame 2  → ERROR → NAK 2 sent
Frame 3  → buffered ✅
Frame 4  → buffered ✅
→ Retransmit only: Frame 2
→ Receiver delivers: 0,1,2,3,4 in order</div>
<div class="tip-box">💡 Window size constraint 2^(n-1) prevents ambiguity between new frames and retransmitted frames with the same sequence number.</div>`,

'ipv4':`<h2>IPv4 Addressing</h2>
<h3>IPv4 Header (20 bytes minimum)</h3>
<table><tr><th>Field</th><th>Size</th><th>Purpose</th></tr>
<tr><td>Version</td><td>4 bits</td><td>IP version (4)</td></tr>
<tr><td>IHL (Header Length)</td><td>4 bits</td><td>Header length in 32-bit words</td></tr>
<tr><td>DSCP / TOS</td><td>8 bits</td><td>Quality of Service (QoS)</td></tr>
<tr><td>Total Length</td><td>16 bits</td><td>Header + data size in bytes (max 65535)</td></tr>
<tr><td>Identification</td><td>16 bits</td><td>Fragment identification</td></tr>
<tr><td>Flags</td><td>3 bits</td><td>DF (Don't Fragment), MF (More Fragments)</td></tr>
<tr><td>Fragment Offset</td><td>13 bits</td><td>Position of fragment in original datagram</td></tr>
<tr><td>TTL</td><td>8 bits</td><td>Time To Live — decremented at each hop, discard when 0</td></tr>
<tr><td>Protocol</td><td>8 bits</td><td>Upper layer (6=TCP, 17=UDP, 1=ICMP)</td></tr>
<tr><td>Header Checksum</td><td>16 bits</td><td>Checksum of header only</td></tr>
<tr><td>Source IP</td><td>32 bits</td><td>Sender's IP address</td></tr>
<tr><td>Destination IP</td><td>32 bits</td><td>Receiver's IP address</td></tr></table>
<h3>IP Address Classes</h3>
<table><tr><th>Class</th><th>Range</th><th>Default Mask</th><th>Networks</th><th>Hosts/Net</th></tr>
<tr><td>A</td><td>1.0.0.0 – 126.255.255.255</td><td>/8 (255.0.0.0)</td><td>126</td><td>16,777,214</td></tr>
<tr><td>B</td><td>128.0.0.0 – 191.255.255.255</td><td>/16 (255.255.0.0)</td><td>16,384</td><td>65,534</td></tr>
<tr><td>C</td><td>192.0.0.0 – 223.255.255.255</td><td>/24 (255.255.255.0)</td><td>2,097,152</td><td>254</td></tr>
<tr><td>D</td><td>224.0.0.0 – 239.255.255.255</td><td>—</td><td>Multicast</td><td>—</td></tr>
<tr><td>E</td><td>240.0.0.0 – 255.255.255.255</td><td>—</td><td>Experimental</td><td>—</td></tr></table>`,

'subnetting':`<h2>Subnetting & CIDR — Worked Examples</h2>
<div class="code-block">CIDR Notation: IP/prefix-length  e.g. 192.168.1.0/24

Given: 192.168.10.0/24 — divide into 4 equal subnets

Step 1: Need 4 subnets → 2^2 = 4 → borrow 2 bits
Step 2: New prefix = /24 + 2 = /26
Step 3: New subnet mask = 255.255.255.192 (11000000)
Step 4: Block size = 256 - 192 = 64

Subnet 0:  192.168.10.0/26   → hosts: .1 to .62,   broadcast: .63
Subnet 1:  192.168.10.64/26  → hosts: .65 to .126,  broadcast: .127
Subnet 2:  192.168.10.128/26 → hosts: .129 to .190, broadcast: .191
Subnet 3:  192.168.10.192/26 → hosts: .193 to .254, broadcast: .255

Hosts per subnet = 2^6 - 2 = 62 (subtract network + broadcast)

Quick formula:
  Subnets = 2^(borrowed bits)
  Hosts/subnet = 2^(host bits) - 2
  Host bits = 32 - prefix length</div>
<div class="tip-box">💡 <strong>Special addresses:</strong> 0.0.0.0 = any/default route, 127.0.0.1 = loopback, 255.255.255.255 = limited broadcast, 169.254.x.x = APIPA (no DHCP found).</div>`,

'nat':`<h2>NAT — Network Address Translation</h2>
<p>NAT allows multiple devices with private IPs to share a single public IP. Implemented on routers/firewalls.</p>
<table><tr><th>Type</th><th>Mapping</th><th>Use Case</th></tr>
<tr><td>Static NAT</td><td>1 private IP → 1 public IP (permanent)</td><td>Web servers, always need same public IP</td></tr>
<tr><td>Dynamic NAT</td><td>Pool of public IPs, assigned on demand</td><td>Limited public IPs for many private hosts</td></tr>
<tr><td>PAT (Overloading / NAPT)</td><td>Many private IPs → 1 public IP, different ports</td><td>Home routers, most corporate networks</td></tr></table>
<div class="code-block">PAT Example (most common — home router):
Private: 192.168.1.10:5000 → Public: 203.0.113.1:10001
Private: 192.168.1.11:5000 → Public: 203.0.113.1:10002
Private: 192.168.1.12:3000 → Public: 203.0.113.1:10003

NAT Table (maintained by router):
Private IP:Port    → Public IP:Port    → Remote IP:Port
192.168.1.10:5000  → 203.0.113.1:10001 → 8.8.8.8:80</div>`,

'ipv6':`<h2>IPv6</h2>
<table><tr><th>Feature</th><th>IPv4</th><th>IPv6</th></tr>
<tr><td>Address size</td><td>32 bits (4 bytes)</td><td>128 bits (16 bytes)</td></tr>
<tr><td>Total addresses</td><td>~4.3 billion</td><td>~340 undecillion</td></tr>
<tr><td>Notation</td><td>Dotted decimal (192.168.1.1)</td><td>Hex colon (2001:0db8::1)</td></tr>
<tr><td>Header size</td><td>Variable (20-60 bytes)</td><td>Fixed 40 bytes</td></tr>
<tr><td>Fragmentation</td><td>By routers and hosts</td><td>Only by source host</td></tr>
<tr><td>Broadcast</td><td>Yes</td><td>No (uses multicast instead)</td></tr>
<tr><td>Checksum in header</td><td>Yes</td><td>No (removed for speed)</td></tr>
<tr><td>ARP</td><td>Uses ARP protocol</td><td>Uses NDP (Neighbor Discovery Protocol)</td></tr></table>
<div class="code-block">IPv6 Address Abbreviation Rules:
Full:        2001:0db8:0000:0000:0000:ff00:0042:8329
Rule 1:      2001:0db8:0:0:0:ff00:42:8329  (drop leading zeros)
Rule 2:      2001:0db8::ff00:42:8329        (:: replaces longest run of all-zero groups)

Special addresses:
::1          = Loopback (like 127.0.0.1)
::           = Unspecified (like 0.0.0.0)
fe80::/10   = Link-local (auto-configured)
2001:db8::/32 = Documentation prefix (like 192.168.x.x)</div>`,

'routing-basics':`<h2>Routing — Static vs Dynamic</h2>
<table><tr><th></th><th>Static Routing</th><th>Dynamic Routing</th></tr>
<tr><td>Configuration</td><td>Manual by admin</td><td>Automatic via routing protocols</td></tr>
<tr><td>Adaptability</td><td>Cannot adapt to failures</td><td>Automatically recalculates routes</td></tr>
<tr><td>Overhead</td><td>None</td><td>CPU/bandwidth for protocol messages</td></tr>
<tr><td>Use case</td><td>Small networks, stub routes</td><td>Large enterprise, ISP networks</td></tr></table>
<h3>Distance Vector vs Link State</h3>
<table><tr><th></th><th>Distance Vector (RIP)</th><th>Link State (OSPF)</th></tr>
<tr><td>Info shared</td><td>Routing table to neighbors</td><td>Link state (topology) to ALL routers</td></tr>
<tr><td>Algorithm</td><td>Bellman-Ford</td><td>Dijkstra (SPF)</td></tr>
<tr><td>Convergence</td><td>Slow</td><td>Fast</td></tr>
<tr><td>Scalability</td><td>Small networks</td><td>Large networks</td></tr>
<tr><td>Counting to infinity</td><td>Problem</td><td>No problem</td></tr></table>`,

'rip':`<h2>RIP — Routing Information Protocol</h2>
<ul>
<li><strong>Type:</strong> Distance Vector, Interior Gateway Protocol (IGP)</li>
<li><strong>Metric:</strong> Hop count (each router = 1 hop)</li>
<li><strong>Max hops:</strong> 15 (16 = unreachable — prevents infinite counting)</li>
<li><strong>Update:</strong> Full routing table broadcast every 30 seconds</li>
<li><strong>Protocol:</strong> UDP port 520</li>
<li><strong>Versions:</strong> RIPv1 (classful), RIPv2 (classless, supports CIDR)</li>
</ul>
<div class="note-box">⚠️ RIP's counting-to-infinity problem: when a link fails, routers may keep incrementing the hop count, thinking a path still exists. Solutions: Split Horizon, Route Poisoning, Holddown Timers.</div>`,

'ospf':`<h2>OSPF — Open Shortest Path First</h2>
<ul>
<li><strong>Type:</strong> Link State, IGP</li>
<li><strong>Algorithm:</strong> Dijkstra's SPF (Shortest Path First)</li>
<li><strong>Metric:</strong> Cost = 10^8 / bandwidth (lower = better)</li>
<li><strong>Convergence:</strong> Very fast (within seconds)</li>
<li><strong>Protocol:</strong> IP protocol 89 (not TCP or UDP)</li>
<li><strong>Areas:</strong> Hierarchical — backbone area 0 + other areas</li>
</ul>
<div class="code-block">OSPF Router Types:
DR  (Designated Router)        — elected in multi-access network, reduces LSA flooding
BDR (Backup Designated Router) — takes over if DR fails
ABR (Area Border Router)       — connects backbone + other areas
ASBR (Autonomous System BR)    — connects OSPF to external routing protocol</div>`,

'bgp':`<h2>BGP — Border Gateway Protocol</h2>
<ul>
<li><strong>Type:</strong> Path Vector, Exterior Gateway Protocol (EGP)</li>
<li><strong>Purpose:</strong> Routing between Autonomous Systems (AS) — the Internet's routing protocol</li>
<li><strong>Protocol:</strong> TCP port 179</li>
<li><strong>Metric:</strong> Path attributes (AS_PATH, NEXT_HOP, LOCAL_PREF, MED...)</li>
<li><strong>Convergence:</strong> Slow (designed for stability, not speed)</li>
</ul>
<div class="example-box"><strong>BGP Route Selection (simplified):</strong><br>
1. Highest LOCAL_PREF (prefer routes from trusted neighbors)<br>
2. Shortest AS_PATH (fewer AS hops = better)<br>
3. Lowest MED (Multi-Exit Discriminator)<br>
4. eBGP over iBGP routes<br>
5. Lowest IGP metric to NEXT_HOP</div>`,

'icmp':`<h2>ICMP — Internet Control Message Protocol</h2>
<p>ICMP carries error and control messages for IP. Encapsulated directly in IP (protocol = 1).</p>
<table><tr><th>Type</th><th>Code</th><th>Message</th></tr>
<tr><td>0</td><td>0</td><td>Echo Reply (ping response)</td></tr>
<tr><td>3</td><td>0</td><td>Destination Network Unreachable</td></tr>
<tr><td>3</td><td>3</td><td>Destination Port Unreachable</td></tr>
<tr><td>4</td><td>0</td><td>Source Quench (slow down!)</td></tr>
<tr><td>8</td><td>0</td><td>Echo Request (ping)</td></tr>
<tr><td>11</td><td>0</td><td>TTL Exceeded (used by traceroute)</td></tr>
<tr><td>12</td><td>0</td><td>Parameter Problem in IP Header</td></tr></table>
<div class="code-block"># How traceroute works using ICMP TTL
Send UDP packet with TTL=1 → Router 1 discards, sends ICMP "TTL exceeded" → reveals Router 1's IP
Send UDP packet with TTL=2 → Router 2 discards, sends ICMP "TTL exceeded" → reveals Router 2's IP
...repeat until destination reached → ICMP "Port Unreachable" (or Echo Reply)</div>`,

'dhcp':`<h2>DHCP — Dynamic Host Configuration Protocol</h2>
<p>DHCP automatically assigns IP addresses and configuration (gateway, DNS) to network devices.</p>
<div class="code-block">DHCP DORA Process (UDP — port 67 server, 68 client):

D — DISCOVER:  Client broadcasts  0.0.0.0 → 255.255.255.255
               "I need an IP address!"
O — OFFER:     Server unicasts/broadcasts offer
               "Here's 192.168.1.10, lease time 24hrs"
R — REQUEST:   Client broadcasts acceptance
               "I'd like 192.168.1.10 please"
A — ACK:       Server confirms assignment
               "192.168.1.10 is yours for 24 hours"

Also provides: Subnet mask, Default gateway, DNS servers</div>`,

'tcp-udp-compare':`<h2>TCP vs UDP — Complete Comparison</h2>
<table><tr><th>Feature</th><th>TCP</th><th>UDP</th></tr>
<tr><td>Connection</td><td>Connection-oriented (handshake required)</td><td>Connectionless</td></tr>
<tr><td>Reliability</td><td>Reliable — ACKs, retransmission</td><td>Unreliable — best effort</td></tr>
<tr><td>Ordering</td><td>Guaranteed order (sequence numbers)</td><td>No ordering</td></tr>
<tr><td>Flow control</td><td>Yes (receive window)</td><td>No</td></tr>
<tr><td>Congestion control</td><td>Yes (slow start, AIMD)</td><td>No</td></tr>
<tr><td>Header size</td><td>20-60 bytes</td><td>8 bytes (fixed)</td></tr>
<tr><td>Speed</td><td>Slower (overhead)</td><td>Faster (no overhead)</td></tr>
<tr><td>Use cases</td><td>HTTP, HTTPS, FTP, SMTP, SSH</td><td>DNS, DHCP, VoIP, Gaming, Video streaming</td></tr></table>`,

'port-numbers':`<h2>Port Numbers</h2>
<table><tr><th>Range</th><th>Type</th><th>Examples</th></tr>
<tr><td>0 – 1023</td><td>Well-Known Ports</td><td>80(HTTP), 443(HTTPS), 22(SSH), 21(FTP), 25(SMTP), 53(DNS), 110(POP3), 143(IMAP)</td></tr>
<tr><td>1024 – 49151</td><td>Registered Ports</td><td>3306(MySQL), 5432(PostgreSQL), 27017(MongoDB), 6379(Redis), 8080(HTTP-alt)</td></tr>
<tr><td>49152 – 65535</td><td>Dynamic/Ephemeral</td><td>Assigned by OS for client connections</td></tr></table>`,

'tcp-handshake':`<h2>3-Way Handshake & 4-Way Termination</h2>
<div class="code-block">3-Way Handshake (Connection Establishment):

Client                            Server
  |                                 |
  |------- SYN (seq=x) ----------→|  Client: "Let's connect, my ISN is x"
  |                                 |
  |←--- SYN-ACK (seq=y,ack=x+1) --|  Server: "OK! My ISN is y, got your x"
  |                                 |
  |------- ACK (ack=y+1) --------→|  Client: "Got it! Ready to send data"
  |                                 |
  |====== Data Transfer ==========|

4-Way Termination (Connection Teardown):
Client                            Server
  |------- FIN (seq=x) ----------→|  Client: "Done sending"
  |←------ ACK (ack=x+1) ---------|  Server: "Got it, but I may still have data"
  |←------ FIN (seq=y) ----------|   Server: "Now I'm done too"
  |------- ACK (ack=y+1) --------→|  Client: "OK, closing"
  (Client waits 2×MSL before closing — TIME_WAIT state)</div>`,

'tcp-header':`<h2>TCP Header — All Fields</h2>
<table><tr><th>Field</th><th>Size</th><th>Purpose</th></tr>
<tr><td>Source Port</td><td>16 bits</td><td>Sender's port number</td></tr>
<tr><td>Destination Port</td><td>16 bits</td><td>Receiver's port number</td></tr>
<tr><td>Sequence Number</td><td>32 bits</td><td>Byte offset of this segment in stream</td></tr>
<tr><td>Acknowledgment Number</td><td>32 bits</td><td>Next byte expected from other side</td></tr>
<tr><td>Data Offset</td><td>4 bits</td><td>Header length in 32-bit words</td></tr>
<tr><td>Flags</td><td>9 bits</td><td>SYN, ACK, FIN, RST, PSH, URG, ECE, CWR, NS</td></tr>
<tr><td>Window Size</td><td>16 bits</td><td>Receive window (flow control)</td></tr>
<tr><td>Checksum</td><td>16 bits</td><td>Error detection (header + data)</td></tr>
<tr><td>Urgent Pointer</td><td>16 bits</td><td>Points to urgent data (if URG flag set)</td></tr>
<tr><td>Options</td><td>0-40 bytes</td><td>MSS, Window Scale, SACK, Timestamps</td></tr></table>`,

'tcp-congestion':`<h2>TCP Congestion Control</h2>
<table><tr><th>Phase</th><th>Algorithm</th><th>Behavior</th></tr>
<tr><td>Slow Start</td><td>Exponential increase</td><td>cwnd starts at 1 MSS, doubles every RTT until ssthresh</td></tr>
<tr><td>Congestion Avoidance</td><td>Additive Increase</td><td>cwnd += 1 MSS per RTT (linear increase)</td></tr>
<tr><td>Packet Loss (timeout)</td><td>Multiplicative Decrease</td><td>ssthresh = cwnd/2, cwnd = 1 MSS, restart slow start</td></tr>
<tr><td>3 Duplicate ACKs</td><td>Fast Retransmit + Recovery</td><td>ssthresh = cwnd/2, cwnd = ssthresh (Reno) or halved (CUBIC)</td></tr></table>
<div class="code-block">AIMD = Additive Increase Multiplicative Decrease
Slow Start threshold (ssthresh): initially large
cwnd: congestion window (limits how much data can be in flight)

Timeline:
RTT 1: cwnd=1  (Slow Start)
RTT 2: cwnd=2  (SS)
RTT 3: cwnd=4  (SS, hits ssthresh=4)
RTT 4: cwnd=5  (Congestion Avoidance: +1)
RTT 5: cwnd=6  (CA)
RTT 6: LOSS!   ssthresh=3, cwnd=1
RTT 7: cwnd=1  (SS again)</div>`,

'https-tls':`<h2>HTTPS & TLS/SSL Handshake</h2>
<div class="code-block">TLS 1.3 Handshake (simplified):

Client                                    Server
  |                                         |
  |------- ClientHello ----------------→|   (TLS version, random, cipher suites)
  |                                         |
  |←------ ServerHello -------------------|  (chosen cipher, server random)
  |←------ Certificate -------------------|  (server's X.509 cert with public key)
  |←------ CertificateVerify ------------|  (proves private key ownership)
  |←------ Finished ----------------------|  (hash of all handshake messages)
  |                                         |
  |------- Finished -------------------- →|  (client verifies, sends its finished)
  |                                         |
  |======= Encrypted Application Data ====|

Key Exchange: ECDHE (Elliptic Curve Diffie-Hellman Ephemeral)
Session Keys derived from: client_random + server_random + pre-master secret</div>
<div class="tip-box">💡 TLS 1.3 removes RSA key exchange (no forward secrecy) and requires ECDHE. 1-RTT for new connections, 0-RTT for resumed sessions (with caveats).</div>`,

'dns':`<h2>DNS — Domain Name System</h2>
<div class="code-block">DNS Resolution for "www.google.com":

1. Browser cache → OS cache → /etc/hosts
2. If not found → Recursive Resolver (your ISP or 8.8.8.8)
3. Resolver asks Root Server → "." → returns .com TLD servers
4. Resolver asks .com TLD Server → returns google.com nameservers
5. Resolver asks google.com Authoritative NS → returns IP 142.250.x.x
6. Resolver caches result (TTL), returns to client</div>
<h3>DNS Record Types</h3>
<table><tr><th>Record</th><th>Purpose</th><th>Example</th></tr>
<tr><td>A</td><td>Hostname → IPv4</td><td>google.com → 142.250.185.46</td></tr>
<tr><td>AAAA</td><td>Hostname → IPv6</td><td>google.com → 2607:f8b0:...</td></tr>
<tr><td>CNAME</td><td>Alias → Canonical name</td><td>www → google.com</td></tr>
<tr><td>MX</td><td>Mail server for domain</td><td>google.com → smtp.google.com</td></tr>
<tr><td>NS</td><td>Authoritative nameservers</td><td>google.com → ns1.google.com</td></tr>
<tr><td>TXT</td><td>Arbitrary text (SPF, DKIM)</td><td>SPF: "v=spf1 include:..."</td></tr>
<tr><td>SOA</td><td>Zone authority info</td><td>Primary NS, admin email, serial</td></tr>
<tr><td>PTR</td><td>Reverse DNS (IP → hostname)</td><td>142.250.185.46 → lax17s...</td></tr></table>`,

'url-to-page':`<h2>Full Journey: URL → Rendered Page</h2>
<ol>
<li><strong>Browser parses URL:</strong> Extracts protocol (https), hostname (google.com), path (/search), query (?q=...)</li>
<li><strong>DNS Lookup:</strong> Browser → OS cache → DNS resolver → Root → TLD → Authoritative NS → Returns IP</li>
<li><strong>TCP Connection:</strong> 3-way SYN-SYN/ACK-ACK to server IP:443</li>
<li><strong>TLS Handshake:</strong> Negotiate ciphers, verify certificate, derive session keys (~1 RTT for TLS 1.3)</li>
<li><strong>HTTP Request:</strong> Browser sends GET / HTTP/2 with headers (Host, Cookie, Accept, User-Agent...)</li>
<li><strong>Server Processing:</strong> Web server (Nginx) → App server → Database → Generate HTML response</li>
<li><strong>HTTP Response:</strong> 200 OK with HTML, Content-Type: text/html, Set-Cookie, Cache-Control...</li>
<li><strong>Browser Rendering:</strong> Parse HTML → Build DOM. Parse CSS → Build CSSOM. JS execution → Reflows/repaints → Display</li>
<li><strong>Sub-resources:</strong> Browser fetches images, CSS, JS (parallel, multiplexed over HTTP/2)</li>
</ol>
<div class="tip-box">💡 This question is asked in EVERY networking interview. Know it end-to-end — candidates who explain all layers clearly stand out significantly.</div>`,

'symmetric-crypto':`<h2>Symmetric Encryption</h2>
<p>Both sender and receiver use the <strong>same key</strong> for encryption and decryption.</p>
<table><tr><th>Algorithm</th><th>Key Size</th><th>Block Size</th><th>Status</th></tr>
<tr><td>DES</td><td>56 bits</td><td>64 bits</td><td>Broken — too weak</td></tr>
<tr><td>3DES (Triple DES)</td><td>112/168 bits</td><td>64 bits</td><td>Deprecated — slow</td></tr>
<tr><td>AES-128</td><td>128 bits</td><td>128 bits</td><td>✅ Current standard</td></tr>
<tr><td>AES-256</td><td>256 bits</td><td>128 bits</td><td>✅ Highest security</td></tr>
<tr><td>ChaCha20</td><td>256 bits</td><td>Stream cipher</td><td>✅ Fast on mobile</td></tr></table>
<div class="note-box">⚠️ <strong>Key Distribution Problem:</strong> How do two parties securely share the same key? Solution: Use asymmetric encryption to exchange a symmetric key (hybrid encryption — used in TLS).</div>`,

'asymmetric-crypto':`<h2>Asymmetric Encryption — RSA & Diffie-Hellman</h2>
<p>Uses a <strong>key pair</strong>: public key (shared openly) + private key (kept secret). Encrypt with public key, decrypt with private key.</p>
<div class="code-block">RSA Key Generation (simplified):
1. Choose two large primes: p, q
2. n = p × q  (modulus)
3. φ(n) = (p-1)(q-1)
4. Choose e: 1 < e < φ(n), gcd(e,φ(n))=1  (public exponent, usually 65537)
5. Find d: e×d ≡ 1 (mod φ(n))  (private exponent)
Public key:  (n, e)
Private key: (n, d)

Encrypt: C = M^e mod n
Decrypt: M = C^d mod n</div>
<h3>Diffie-Hellman Key Exchange</h3>
<div class="code-block">Allows two parties to agree on a shared secret over insecure channel:
1. Agree on public parameters: prime p, generator g
2. Alice: private a, sends A = g^a mod p
3. Bob:   private b, sends B = g^b mod p
4. Alice: shared secret = B^a mod p = g^(ab) mod p
5. Bob:   shared secret = A^b mod p = g^(ab) mod p
→ Both derive same secret without transmitting it!</div>`,

<tr><td>bcrypt/scrypt</td><td>Variable</td><td>✅ Password hashing</td><td>Slow by design — resists brute force</td></tr></table>`,

'dos-ddos':`<h2>DoS & DDoS Attacks</h2>

<tr><td>DoS (Denial of Service)</td><td>Single attacker floods target</td><td>Rate limiting, traffic filtering</td></tr>

'mitm':`<h2>Man-in-the-Middle & ARP Spoofing</h2>
<div class="code-block">ARP Spoofing (ARP Poisoning):
1. Attacker sends fake ARP reply to victim:
   "IP 192.168.1.1 (gateway) is at MY MAC address"
2. Victim updates ARP cache with attacker's MAC
3. Victim sends all traffic through attacker
4. Attacker reads/modifies traffic, forwards to real gateway
5. Neither victim nor gateway knows!

Defense:
- Dynamic ARP Inspection (DAI) on switches
- Static ARP entries for critical hosts
- Encrypted protocols (HTTPS/TLS makes MITM useless)</div>`,

'stop-wait':`<h2>Stop-and-Wait ARQ</h2>
<div class="code-block">Process:
1. Sender sends frame 0
2. Sender STOPS — waits for ACK
3. If ACK0 received → send frame 1
4. If timeout → retransmit frame 0

Efficiency:
η = Tt / (Tt + 2Tp) = 1/(1+2a)  where a = Tp/Tt

Example:
Tp = 250ms (satellite), Tt = 1ms (large frame)
a = 250, η = 1/(1+500) = 0.2%  — terrible!
→ Need sliding window for high-latency links</div>`,

<div class="example-box"><strong>Why use UDP over TCP?</strong><br>

• <strong>Streaming:</strong> Application-layer reliability more appropriate (QUIC)</div>`,

'digital-signatures':`<h2>Digital Signatures & PKI</h2>
<div class="code-block">Digital Signature Process:

Signing (by sender):
1. Hash the message: H = SHA256(message)
2. Encrypt hash with PRIVATE key: sig = RSA_encrypt(H, private_key)
3. Send: message + signature

Verification (by receiver):
1. Decrypt signature with sender's PUBLIC key: H' = RSA_decrypt(sig, public_key)
2. Hash received message: H = SHA256(received_message)
3. If H == H' → authentic (from that key owner) + integrity (not tampered)

PKI (Public Key Infrastructure):
Certificate Authority (CA) signs server's public key
→ Server's certificate trusted by clients who trust the CA
→ Chain of trust: Root CA → Intermediate CA → End Entity cert</div>`,

'dns-attacks':`<h2>DNS Spoofing & DNS Amplification</h2>
<div class="code-block">DNS Cache Poisoning (Spoofing):
Attack: Attacker sends fake DNS replies to resolver
        before legitimate response arrives
Goal:   Poison cache → redirect users to attacker's IP
Defense: DNSSEC (cryptographic signing of DNS records)
         Randomize source ports + transaction IDs

DNS Amplification (DDoS):
Attack: Spoof victim's IP → send small DNS queries to many open resolvers
        Resolvers send large responses to victim's IP
Factor: DNS query ~60 bytes → response ~3000 bytes = 50x amplification
Defense: Response Rate Limiting (RRL), disable open resolvers</div>`,

'framing':`<h2>Framing — Character & Bit Stuffing</h2>
<div class="code-block">Character Stuffing:
  Escape character (ESC) inserted before any data-ESC or data-FLAG
  Data: A FLAG B  → Framed: FLAG A ESC FLAG B FLAG

Bit Stuffing (HDLC):
  Frame delimiter: 01111110 (six 1s)
  Rule: After 5 consecutive 1s in data, insert a 0
  Data:    011111011111101
  Stuffed: 0111110 1111100 1  (0 inserted after each 5 ones)
  Receiver removes the stuffed 0s after seeing five 1s</div>`,

'switches-vlans':`<h2>Switches, VLANs & Spanning Tree Protocol</h2>
<h3>How a Switch Works</h3>
<div class="code-block">MAC Learning:
1. Frame arrives on port 3 from MAC AA:BB:CC:DD:EE:FF
2. Switch adds to MAC table: AA:BB:CC:DD:EE:FF → Port 3
3. Switch looks up destination MAC in table
4. If found → forward to that port only (unicast)
5. If not found → flood to all ports except source (unknown unicast)</div>
<h3>VLANs</h3>
<p>VLANs logically segment a LAN at Layer 2 — hosts in different VLANs cannot communicate without a Layer 3 device (router/L3 switch).</p>
<h3>STP (Spanning Tree Protocol)</h3>
<p>Prevents Layer 2 loops in networks with redundant links by blocking redundant paths. Elects a Root Bridge, then selects best paths using path cost.</p>`,

'quic':`<h2>QUIC Protocol — HTTP/3 Transport</h2>
<p>QUIC is a new transport protocol developed by Google, now an IETF standard used for HTTP/3.</p>
<table><tr><th>Feature</th><th>TCP+TLS</th><th>QUIC</th></tr>
<tr><td>Transport</td><td>TCP</td><td>UDP with reliability built-in</td></tr>
<tr><td>Connection setup</td><td>1 RTT TCP + 1 RTT TLS = 2 RTT</td><td>0-1 RTT (combines transport + crypto)</td></tr>
<tr><td>HOL blocking</td><td>Yes (TCP stream)</td><td>No (independent streams)</td></tr>
<tr><td>Connection migration</td><td>Breaks on IP change</td><td>Continues (connection ID, not 5-tuple)</td></tr>
<tr><td>Encryption</td><td>Optional (TLS separate)</td><td>Always encrypted (built-in)</td></tr></table>`,

'cdn-proxy':`<h2>CDN, Reverse Proxy & Load Balancer</h2>
<table><tr><th>Component</th><th>Function</th><th>Example</th></tr>
<tr><td>CDN</td><td>Distribute static content geographically close to users</td><td>Cloudflare, AWS CloudFront, Fastly</td></tr>
<tr><td>Reverse Proxy</td><td>Sits in front of servers — handles SSL, caching, compression</td><td>Nginx, HAProxy</td></tr>
<tr><td>Load Balancer</td><td>Distributes traffic across multiple backend servers</td><td>AWS ALB, Nginx, HAProxy</td></tr>
<tr><td>Forward Proxy</td><td>Sits in front of clients — anonymity, content filtering</td><td>Squid, corporate web proxy</td></tr></table>`,

'rest-api':`<h2>REST vs WebSockets vs gRPC</h2>
<table><tr><th></th><th>REST (HTTP)</th><th>WebSocket</th><th>gRPC</th></tr>
<tr><td>Pattern</td><td>Request-Response</td><td>Bidirectional streams</td><td>Unary, streaming, bidirectional</td></tr>
<tr><td>Transport</td><td>HTTP/1.1 or HTTP/2</td><td>WS (upgraded HTTP)</td><td>HTTP/2</td></tr>
<tr><td>Data format</td><td>JSON, XML</td><td>Any (usually JSON)</td><td>Protocol Buffers (binary)</td></tr>
<tr><td>Use case</td><td>CRUD APIs, public APIs</td><td>Real-time, chat, gaming</td><td>Microservices, low latency</td></tr>
<tr><td>Browser support</td><td>Yes</td><td>Yes</td><td>Limited (needs grpc-web)</td></tr></table>`,

'socket':`<h2>Sockets — Connection Establishment</h2>
<div class="code-block"># TCP Socket lifecycle:
# Server side:
socket()   → create socket file descriptor
bind()     → associate socket with port (e.g. :8080)
listen()   → mark socket as passive (accept connections)
accept()   → blocks until client connects, returns new socket
read()     → receive data
write()    → send data
close()    → close connection

# Client side:
socket()   → create socket
connect()  → initiate 3-way handshake to server IP:port
write()    → send data
read()     → receive response
close()    → send FIN, close connection

Socket identified by 5-tuple:
{src_ip, src_port, protocol, dst_ip, dst_port}</div>`,

'tcp-flow-control':`<h2>TCP Flow Control — Sliding Window</h2>
<div class="code-block">Receive Window (rwnd): advertised by receiver in ACK
  → tells sender "I can buffer this many more bytes"

Sender may transmit: min(cwnd, rwnd) bytes

Example:
Receiver: "Buffer size 4096 bytes, used 1024" → rwnd = 3072
Sender: can send up to 3072 bytes before needing ACK

Zero Window:
  If receiver's buffer is full → rwnd = 0
  Sender stops. Sends Window Probe every ~2s to check
  When receiver frees space → rwnd > 0 → sender resumes

TCP buffer sizes (Linux defaults):
  /proc/sys/net/core/rmem_default = 212992 (208KB)
  /proc/sys/net/core/wmem_default = 212992 (208KB)</div>`,

'fragmentation':`<h2>IP Fragmentation & Reassembly</h2>
<div class="code-block">MTU (Maximum Transmission Unit): max frame payload
  Ethernet MTU = 1500 bytes
  Loopback MTU = 65535 bytes

If IP datagram > MTU → fragment at router
  Each fragment has same Identification field
  MF flag (More Fragments): 1 = more to come, 0 = last
  Fragment Offset: position of fragment data / 8

Example: 4000-byte datagram over Ethernet (MTU=1500)
  Header = 20 bytes, so data per fragment = 1480 bytes

Fragment 1: offset=0,  MF=1, data=1480 bytes
Fragment 2: offset=185, MF=1, data=1480 bytes  (1480/8=185)
Fragment 3: offset=370, MF=0, data=1040 bytes

Reassembly: done at DESTINATION only (not intermediate routers in IPv6)</div>`
};

let currentStep=1,completedSteps=JSON.parse(localStorage.getItem('cn_completedSteps')||'[]');
function updateProgress(){const p=(completedSteps.length/6)*100;document.getElementById('progressFill').style.width=p+'%';document.getElementById('progressPercent').textContent=Math.round(p)+'%';document.querySelectorAll('.step-btn').forEach(b=>b.classList.toggle('completed',completedSteps.includes(parseInt(b.dataset.step))));}
function markStepComplete(step){if(!completedSteps.includes(step)){completedSteps.push(step);localStorage.setItem('cn_completedSteps',JSON.stringify(completedSteps));updateProgress();renderStepContent(step);}}
function renderStepContent(step){currentStep=step;const sd=stepsData[step];const isC=completedSteps.includes(step);let html=`<div class="step-content active"><div class="step-header"><div><h2>${sd.title}</h2><p>${sd.description}</p></div>${!isC?`<button class="complete-step-btn" onclick="markStepComplete(${step})">✓ Mark as Complete</button>`:'<div class="completed-badge">✓ Step Completed! 🎉</div>'}</div>`;sd.topics.forEach(t=>{html+=`<div class="topic-card" onclick="toggleSubTopics(this)"><div class="topic-header"><h3><span class="topic-icon">${t.icon}</span> ${t.title}</h3><span class="arrow">›</span></div><div class="sub-topics">`;t.subs.forEach(s=>{html+=`<div class="sub-topic" onclick="showContent(event,'${s.id}')">${s.title}</div>`;});html+=`</div></div>`;});html+=`<div class="detail-container" id="detailContainer"><p style="color:#94a3b8;text-align:center;">🌐 Click any topic to view detailed explanations and real-world examples.</p></div><div class="nav-buttons">${step>1?`<button class="nav-btn prev" onclick="changeStep(${step-1})">← Previous</button>`:'<div></div>'}${step<6?`<button class="nav-btn next" onclick="changeStep(${step+1})">Next →</button>`:`<button class="nav-btn next" onclick="window.location.href='subjects.html'">🏆 Complete CN →</button>`}</div></div>`;document.getElementById('contentSection').innerHTML=html;document.querySelectorAll('.step-btn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.step)===step));}
function changeStep(s){if(s>=1&&s<=6){renderStepContent(s);window.scrollTo({top:0,behavior:'smooth'});}}
function toggleSubTopics(card){const sub=card.querySelector('.sub-topics');const arrow=card.querySelector('.arrow');document.querySelectorAll('.sub-topics').forEach(s=>{if(s!==sub)s.classList.remove('active');});sub.classList.toggle('active');if(arrow)arrow.style.transform=sub.classList.contains('active')?'rotate(90deg)':'rotate(0deg)';}
function showContent(e,id){e.stopPropagation();const dc=document.getElementById('detailContainer');dc.innerHTML=detailedContent[id]||'<p>Content coming soon!</p>';dc.scrollIntoView({behavior:'smooth',block:'start'});}
document.querySelectorAll('.step-btn').forEach(b=>b.addEventListener('click',()=>changeStep(parseInt(b.dataset.step))));
updateProgress();renderStepContent(1);
</script>
